<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>

<style>

body{
background:#061c28;
font-family:arial;
text-align:center;
color:white;
}

.container{
margin-top:80px;
}

input{
width:80%;
padding:15px;
margin:10px;
border-radius:12px;
border:none;
background:#1e3443;
color:white;
font-size:16px;
}

button{
width:80%;
padding:15px;
border:none;
border-radius:12px;
background:#00e0a4;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#00c794;
}

a{
color:white;
}

</style>

</head>

<body>

<div class="container">

<h2>Sign up</h2>

<input type="text" id="name" placeholder="Full name">

<input type="email" id="email" placeholder="Gmail">

<input type="password" id="password" placeholder="Password">

<br>

<button onclick="signup()">Continue</button>

<br><br>

<a href="login.html">Already have account?</a>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { 
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",
measurementId: "G-BHD1Z4TD7G"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


window.signup = async function(){

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(!name || !email || !password){

alert("Please fill all fields");
return;

}

try{

const userCredential = await createUserWithEmailAndPassword(auth,email,password);

const user = userCredential.user;

await setDoc(doc(db,"users",user.uid),{

name:name,
email:email,
uid:user.uid,
createdAt:serverTimestamp()

});

alert("Account Created Successfully");

window.location.href="dashboard.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
