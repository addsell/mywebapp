<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
font-family:Arial;
background:#e6f4df;
padding:20px;
display:none;
}

.header{
background:#2c9ac7;
color:#fff;
padding:15px;
text-align:center;
font-size:24px;
}

.box{
margin-top:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px;
margin-top:10px;
width:100%;
}
</style>
</head>

<body>

<div class="header">Profile</div>

<div class="box">
<h2 id="name">Loading...</h2>
<p>Address: <span id="address">-</span></p>
<p>Phone: <span id="phone">-</span></p>

<button onclick="openEdit()">Edit</button>
</div>

<div id="editBox" style="display:none;">
<input id="eName" placeholder="Name">
<input id="eAddress" placeholder="Address">
<input id="ePhone" placeholder="Phone">
<button onclick="save()">Save</button>
</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let userData = {};
let currentUser = null;

/* 🔐 auth check */
onAuthStateChanged(auth, async(user)=>{

document.body.style.display = "block";

if(!user){
location.href="login.html";
return;
}

currentUser = user;

/* 🔥 load data */
const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(snap.exists()){
userData = snap.data();
}else{
userData = {
name:"My Shop",
address:"",
phone:""
};
await setDoc(ref,userData);
}

render();

});

/* render */
function render(){
document.getElementById("name").innerText = userData.name || "-";
document.getElementById("address").innerText = userData.address || "-";
document.getElementById("phone").innerText = userData.phone || "-";
}

/* open edit */
window.openEdit = function(){
document.getElementById("editBox").style.display="block";

document.getElementById("eName").value = userData.name || "";
document.getElementById("eAddress").value = userData.address || "";
document.getElementById("ePhone").value = userData.phone || "";
}

/* save */
window.save = async function(){

userData.name = document.getElementById("eName").value;
userData.address = document.getElementById("eAddress").value;
userData.phone = document.getElementById("ePhone").value;

await setDoc(doc(db,"users",currentUser.uid),userData,{merge:true});

render();
alert("Saved!");

}

</script>

</body>
</html>
