<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(180deg,#cfe9c8,#eaf6e3);
padding:15px;
display:none;
}

/* header */
.header{
background:linear-gradient(90deg,#2c9ac7,#1e5f9a);
color:#ffbf5e;
font-size:28px;
font-weight:bold;
text-align:center;
padding:20px;
border-radius:10px;
}

/* shop name */
.shop{
font-size:40px;
font-weight:bold;
color:#2c7ecb;
margin:25px 10px;
}

/* info */
.info{
font-size:22px;
color:#2c7ecb;
margin:20px 10px;
line-height:1.6;
}

/* edit button */
.edit-btn{
display:block;
margin:60px auto;
padding:14px 30px;
background:linear-gradient(90deg,#2c9ac7,#1e5f9a);
color:#ffbf5e;
font-size:20px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* divider */
.divider{
height:20px;
background:linear-gradient(90deg,#2c9ac7,#1e5f9a);
border-radius:6px;
margin:30px 0;
}

/* ad */
.ad{
text-align:center;
font-size:20px;
color:#2c7ecb;
}

.buy{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:linear-gradient(90deg,#2c9ac7,#1e5f9a);
color:#ffbf5e;
border-radius:8px;
text-decoration:none;
}

/* footer */
.footer{
background:#333;
color:#8fff8f;
text-align:center;
padding:18px;
border-radius:10px;
margin-top:30px;
font-size:18px;
}

/* modal */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.form{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:400px;
}

.form input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

.btn-row{
display:flex;
gap:10px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.save{background:#00b96b;color:white;}
.cancel{background:#999;color:white;}

</style>
</head>

<body>

<div class="header">My Profile Information</div>

<div class="shop" id="name">Loading...</div>

<div class="info">
<b>Address:</b> <span id="address">Loading...</span>
</div>

<div class="info">
<b>Contact:</b> <span id="phone">Loading...</span>
</div>

<button class="edit-btn" onclick="openForm()">Edit My Profile</button>

<div class="divider"></div>

<div class="ad">
এক মাসের প্লান কিনুন মাত্র ৫০৳ <br>
অবশিষ্ট সময়ঃ <span id="timer">43200</span> সেকেন্ড <br>
<a href="#" class="buy">Click and buy</a>
</div>

<div class="footer">
Need Help WhatsApp +8801734289027
</div>

<!-- modal -->
<div class="modal" id="modal">
<div class="form">

<h3>Edit Profile</h3>

<input type="text" id="inputName" placeholder="Shop Name">
<input type="text" id="inputAddress" placeholder="Address">
<input type="text" id="inputPhone" placeholder="Phone">

<div class="btn-row">
<button class="btn save" onclick="save()">Save</button>
<button class="btn cancel" onclick="closeForm()">Cancel</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* 🔥 Firebase config */
const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"
};

/* 🔥 important fix */
const app = getApps().length ? getApp() : initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* 🔐 auth check */
onAuthStateChanged(auth, async(user)=>{

document.body.style.display = "block";

if(!user){
location.href="login.html";
return;
}

currentUser = user;

/* load profile */
const ref = doc(db,"users",user.uid);
const snap = await getDoc(ref);

if(snap.exists()){
const data = snap.data();

document.getElementById("name").innerText = data.name || "My Shop";
document.getElementById("address").innerText = data.address || "Not set";
document.getElementById("phone").innerText = data.phone || "Not set";

}else{

await setDoc(ref,{
name:"My Shop",
address:"",
phone:"",
uid:user.uid
});

document.getElementById("name").innerText = "My Shop";

}

});

/* open modal */
window.openForm = function(){

document.getElementById("inputName").value =
document.getElementById("name").innerText;

document.getElementById("inputAddress").value =
document.getElementById("address").innerText;

document.getElementById("inputPhone").value =
document.getElementById("phone").innerText;

document.getElementById("modal").style.display="flex";
}

/* close */
window.closeForm = function(){
document.getElementById("modal").style.display="none";
}

/* save */
window.save = async function(){

const name = document.getElementById("inputName").value.trim();
const address = document.getElementById("inputAddress").value.trim();
const phone = document.getElementById("inputPhone").value.trim();

if(name==""){
alert("Name required");
return;
}

await setDoc(doc(db,"users",currentUser.uid),{
name,
address,
phone,
uid:currentUser.uid
},{merge:true});

document.getElementById("name").innerText = name;
document.getElementById("address").innerText = address || "Not set";
document.getElementById("phone").innerText = phone || "Not set";

closeForm();

alert("Profile Updated");

}

/* timer */
let t = 43200;
setInterval(()=>{
if(t>0){
t--;
document.getElementById("timer").innerText = t;
}
},1000);

</script>

</body>
</html>
