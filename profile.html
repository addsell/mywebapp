<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(180deg,#cfe9c8,#e6f4df);
padding:15px;
}

/* header */
.header{
background:linear-gradient(90deg,#2c9ac7,#1e5f9a);
color:#ffbf5e;
font-size:26px;
font-weight:bold;
text-align:center;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

/* profile box */
.profile-box{
padding:10px;
}

.shop{
font-size:36px;
font-weight:bold;
color:#2c7ecb;
margin-bottom:20px;
}

.info{
font-size:20px;
color:#2c7ecb;
margin:15px 0;
line-height:1.5;
}

/* button */
.edit-btn{
display:block;
margin:40px auto;
padding:14px 30px;
background:linear-gradient(90deg,#2c9ac7,#1e5f9a);
color:#ffbf5e;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* divider */
.divider{
height:18px;
background:linear-gradient(90deg,#2c9ac7,#1e5f9a);
margin:20px 0;
border-radius:6px;
}

/* ad section */
.ad{
font-size:20px;
color:#2c7ecb;
text-align:center;
margin-bottom:20px;
}

.buy-btn{
display:inline-block;
margin-top:10px;
background:linear-gradient(90deg,#2c9ac7,#1e5f9a);
color:#ffbf5e;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
}

/* footer */
.footer{
background:#333;
color:#8fff8f;
text-align:center;
padding:20px;
border-radius:10px;
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<div class="header">My Profile Information</div>

<div class="profile-box">

<div class="shop" id="shopName">A.R.K Shop</div>

<div class="info"><b>Address:</b> <span id="address">মালঞ্চ সিনেমা হল রোড, টাঙ্গাইল সদর।</span></div>

<div class="info"><b>Contact:</b> <span id="phone">017xxxxxxxx</span></div>

<button class="edit-btn" onclick="editProfile()">Edit My Profile</button>

</div>

<div class="divider"></div>

<div class="ad">
এক মাসের প্লান কিনুন মাত্র ৫০৳ <br>
অবশিষ্ট সময়ঃ <span id="timer">43200</span> সেকেন্ড <br>

<a href="#" class="buy-btn">Click and buy</a>
</div>

<div class="footer">
Need Help WhatsApp +8801734289027
</div>

<script>

/* demo edit */
function editProfile(){
alert("Edit page add করতে পারো 🔥");
}

/* countdown timer */
let time = 43200;

setInterval(()=>{
if(time > 0){
time--;
document.getElementById("timer").innerText = time;
}
},1000);

</script>

</body>
</html>
