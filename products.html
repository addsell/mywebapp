<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>

body{
margin:0;
font-family:Arial;
background:#d6ead3;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:linear-gradient(90deg,#3e8ec4,#5aa0b5);
font-size:22px;
font-weight:bold;
}

.addBtn{
color:#ffc55c;
cursor:pointer;
}

/* SEARCH */
.searchBox{
margin:15px;
background:#7bd389;
padding:15px;
border-radius:30px;
}

.searchBox input{
width:100%;
border:none;
background:none;
font-size:16px;
outline:none;
}

/* CATEGORY */
.catWrap{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
}

.cat{
background:#7bd389;
padding:8px 18px;
border-radius:20px;
cursor:pointer;
}

/* CARD */
.card{
margin:10px;
padding:15px;
border-radius:25px;
background:linear-gradient(90deg,#7b4ce2,#00a86b);
display:flex;
gap:10px;
color:black;
}

.card img{
width:70px;
height:70px;
border-radius:10px;
}

.left{
flex:1;
}

.right{
text-align:right;
}

/* BUTTON */
.btn{
padding:8px 15px;
border:none;
border-radius:15px;
margin:3px;
cursor:pointer;
}

.edit{background:#fff;}
.delete{background:red;color:#fff;}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.form{
background:#fff;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

.form input,.form select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}

.saveBtn{
background:#ffb84d;
border:none;
padding:12px;
width:100%;
border-radius:20px;
font-size:18px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div>Products List</div>
<div class="addBtn" onclick="openForm()">+ Add Products</div>
</div>

<!-- SEARCH -->
<div class="searchBox">
<input id="search" placeholder="Search Name/Code/Category">
</div>

<!-- CATEGORY -->
<div class="catWrap" id="cats"></div>

<!-- LIST -->
<div id="list"></div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal" style="display:flex">
<div class="form">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="saveBtn" onclick="login()">Login</button>
<button class="saveBtn" onclick="signup()">Signup</button>
</div>
</div>

<!-- ADD PRODUCT -->
<div class="modal" id="modal">
<div class="form">

<h3>Add Products</h3>

<input type="file" id="image">
<input id="name" placeholder="Product Name">
<input id="code" placeholder="Product Code">

<select id="category"></select>

<input id="stock" placeholder="Total Stock">
<input id="buy" placeholder="Purchase Price">
<input id="sell" placeholder="Selling Price">
<input id="mrp" placeholder="MRP">

<button class="saveBtn" onclick="save()">Save</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
query, where, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let products=[];

/* AUTH */
onAuthStateChanged(auth,(u)=>{
if(u){
user=u;
loginModal.style.display="none";
loadProducts();
loadCategory();
}else{
loginModal.style.display="flex";
}
});

/* LOGIN */
window.login=()=>signInWithEmailAndPassword(auth,email.value,password.value);

/* SIGNUP */
window.signup=()=>createUserWithEmailAndPassword(auth,email.value,password.value);

/* LOAD PRODUCTS */
function loadProducts(){
onSnapshot(query(collection(db,"products"), where("uid","==",user.uid)),snap=>{
products=[];
snap.forEach(d=>products.push({...d.data(),id:d.id}));
render(products);
});
}

/* LOAD CATEGORY */
function loadCategory(){
onSnapshot(query(collection(db,"categories"), where("uid","==",user.uid)),snap=>{

category.innerHTML="";
cats.innerHTML=`<div class="cat" onclick="filterCat('All')">All</div>`;

snap.forEach(d=>{
let c=d.data();

category.innerHTML+=`<option>${c.name}</option>`;
cats.innerHTML+=`<div class="cat" onclick="filterCat('${c.name}')">${c.name}</div>`;
});
});
}

/* RENDER */
function render(data){
list.innerHTML="";

data.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img || ''}">
<div class="left">
<b>${p.name}</b><br>
MRP: ${p.mrp} | Sell: ${p.sell}<br>
Code: ${p.code}<br>
${p.category}
</div>

<div class="right">
Stock: ${p.stock}<br>
<button class="btn delete" onclick="del('${p.id}')">Delete</button>
</div>
</div>`;
});
}

/* DELETE */
window.del=async(id)=>{
if(confirm("Delete?")){
await deleteDoc(doc(db,"products",id));
}
};

/* FILTER */
window.filterCat=(c)=>{
if(c=="All") render(products);
else render(products.filter(p=>p.category==c));
};

/* SEARCH */
search.oninput=function(){
let v=this.value.toLowerCase();
render(products.filter(p=>
(p.name||"").toLowerCase().includes(v) ||
(p.code||"").includes(v)
));
};

/* MODAL */
window.openForm=()=>modal.style.display="flex";

/* SAVE */
window.save=async()=>{

if(!user) return alert("Login first");

let img="";

if(image.files.length>0){

const reader=new FileReader();

reader.onload=async(e)=>{
img=e.target.result;

await addDoc(collection(db,"products"),{
name:name.value,
code:code.value,
category:category.value,
stock:Number(stock.value||0),
buy:Number(buy.value||0),
sell:Number(sell.value||0),
mrp:Number(mrp.value||0),
img:img,
uid:user.uid
});

alert("Saved");
modal.style.display="none";
};

reader.readAsDataURL(image.files[0]);

}else{

await addDoc(collection(db,"products"),{
name:name.value,
code:code.value,
category:category.value,
stock:Number(stock.value||0),
buy:Number(buy.value||0),
sell:Number(sell.value||0),
mrp:Number(mrp.value||0),
img:"",
uid:user.uid
});

alert("Saved");
modal.style.display="none";
}
};

</script>

</body>
</html>
