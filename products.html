<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(#4da3c7,#b5e0b3);
}

.topbar{
display:flex;
justify-content:space-between;
padding:15px;
font-size:22px;
font-weight:bold;
align-items:center;
}

.controls{
display:flex;
gap:10px;
}

.viewbtn{
padding:10px 15px;
border:none;
border-radius:20px;
background:#ffcc66;
cursor:pointer;
}

.container{
padding:10px;
}

.searchbox{
display:flex;
gap:10px;
margin-bottom:10px;
}

.search{
flex:1;
background:#7ed37a;
padding:12px;
border-radius:40px;
}

.search input{
border:none;
background:transparent;
width:100%;
font-size:16px;
outline:none;
}

.filter{
padding:10px;
border-radius:20px;
border:none;
}

.list .card{
display:flex;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.grid .card{
flex-direction:column;
}

.card{
background:linear-gradient(90deg,#7d4cff,#0ecf83);
border-radius:20px;
padding:10px;
margin-bottom:10px;
}

.card img{
width:80px;
height:90px;
border-radius:10px;
object-fit:cover;
}

.info{
margin-left:10px;
}

.formbox{
display:none;
padding:15px;
}

.formbox input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:30px;
border:none;
background:linear-gradient(90deg,#7d4cff,#0ecf83);
}

.savebtn{
margin-top:10px;
padding:12px;
background:#f4a94a;
border:none;
border-radius:30px;
font-size:18px;
width:100%;
}

.preview{
width:120px;
height:120px;
background:#aaa;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
margin-bottom:10px;
}

.preview img{
width:100%;
height:100%;
object-fit:cover;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.modal img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<div class="topbar">

<div>Products</div>

<div class="controls">

<button onclick="toggleView()" class="viewbtn">View</button>
<button onclick="showForm()" class="viewbtn">Add</button>

</div>

</div>

<div class="container">

<div class="searchbox">

<div class="search">
<input id="search" placeholder="Search..." onkeyup="searchProduct()">
</div>

<select id="categoryFilter" class="filter" onchange="filterCategory()">
<option value="">All</option>
</select>

</div>

<div id="productList" class="list"></div>

</div>


<div class="formbox" id="formbox">

<h2>Add Product</h2>

<div class="preview" id="previewBox">
<img id="previewImg">
</div>

<input type="file" id="upload">

<input id="name" placeholder="Product Name">
<input id="code" placeholder="Product Code">

<select id="categorySelect"></select>

<input id="newCategory" placeholder="Add New Category">
<button onclick="addCategory()">Add Category</button>

<input id="stock" placeholder="Stock">
<input id="purchase" placeholder="Purchase Price">
<input id="sell" placeholder="Sell Price">
<input id="mrp" placeholder="MRP">

<button class="savebtn" onclick="saveProduct()">Save</button>

</div>


<div class="modal" id="imgModal" onclick="closeModal()">
<img id="modalImg">
</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";


const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.appspot.com",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"
};

const app = initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);


const uploadInput=document.getElementById("upload");
const previewImg=document.getElementById("previewImg");

const nameInput=document.getElementById("name");
const codeInput=document.getElementById("code");
const categorySelect=document.getElementById("categorySelect");

const stockInput=document.getElementById("stock");
const purchaseInput=document.getElementById("purchase");
const sellInput=document.getElementById("sell");
const mrpInput=document.getElementById("mrp");

const productList=document.getElementById("productList");
const formbox=document.getElementById("formbox");

let imageFile=null
let allProducts=[]
let categories=new Set()

uploadInput.onchange=()=>{

imageFile=uploadInput.files[0]

let reader=new FileReader()

reader.onload=e=>{
previewImg.src=e.target.result
}

reader.readAsDataURL(imageFile)

}


window.showForm=()=>{
formbox.style.display="block"
window.scrollTo(0,document.body.scrollHeight)
}


window.saveProduct=async()=>{

try{

let imgURL=""

if(imageFile){

let storageRef=ref(storage,"products/"+Date.now())

await uploadBytes(storageRef,imageFile)

imgURL=await getDownloadURL(storageRef)

}

let data={

name:nameInput.value,
code:codeInput.value,
category:categorySelect.value,
stock:stockInput.value,
purchase:purchaseInput.value,
sell:sellInput.value,
mrp:mrpInput.value,
image:imgURL

}

await addDoc(collection(db,"products"),data)

alert("Product Added Successfully")

formbox.style.display="none"

previewImg.src=""
uploadInput.value=""

nameInput.value=""
codeInput.value=""
stockInput.value=""
purchaseInput.value=""
sellInput.value=""
mrpInput.value=""

}catch(err){

alert(err.message)

}

}



onSnapshot(collection(db,"products"),snap=>{

productList.innerHTML=""
allProducts=[]
categories=new Set()

snap.forEach(docu=>{

let d=docu.data()
d.id=docu.id

allProducts.push(d)

categories.add(d.category)

showCard(d)

})

loadCategories()

})


function loadCategories(){

categoryFilter.innerHTML=`<option value="">All</option>`
categorySelect.innerHTML=""

categories.forEach(c=>{

categoryFilter.innerHTML+=`<option value="${c}">${c}</option>`
categorySelect.innerHTML+=`<option value="${c}">${c}</option>`

})

}


function showCard(d){

productList.innerHTML+=`

<div class="card">

<img src="${d.image||''}" onclick="zoom('${d.image}')">

<div class="info">

<b>${d.name}</b><br>

MRP ${d.mrp} | Sell ${d.sell}

<div>

Code:${d.code}<br>
Category:${d.category}<br>
Stock:${d.stock}

</div>

<button onclick="deleteProduct('${d.id}')">Delete</button>

</div>

</div>

`

}


window.searchProduct=()=>{

let s=search.value.toLowerCase()

productList.innerHTML=""

allProducts.forEach(p=>{

if(
p.name.toLowerCase().includes(s)||
p.code.toLowerCase().includes(s)||
p.category.toLowerCase().includes(s)
){

showCard(p)

}

})

}


window.filterCategory=()=>{

let c=categoryFilter.value

productList.innerHTML=""

allProducts.forEach(p=>{

if(c==""||p.category==c){

showCard(p)

}

})

}


window.addCategory=()=>{

let c=newCategory.value

if(!c)return

categories.add(c)

loadCategories()

newCategory.value=""

}


window.deleteProduct=async(id)=>{

await deleteDoc(doc(db,"products",id))

}


window.zoom=(img)=>{

if(!img)return

modalImg.src=img

imgModal.style.display="flex"

}


window.closeModal=()=>{

imgModal.style.display="none"

}


window.toggleView=()=>{

productList.classList.toggle("grid")
productList.classList.toggle("list")

}

</script>

</body>
</html>
