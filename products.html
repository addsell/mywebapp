<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Products</title>

<style>

body{
margin:0;
font-family:Arial;
background:#d7e6d0;
}

.navbar{
display:flex;
gap:25px;
padding:15px;
background:linear-gradient(90deg,#4c86a8,#6ab1a0);
font-weight:bold;
}

.navbar div{
cursor:pointer;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid gray;
}

button{
padding:12px;
background:#2196F3;
border:none;
color:white;
border-radius:6px;
width:100%;
}

.product{
background:white;
padding:10px;
margin:10px 0;
border-radius:6px;
}

.low{
color:red;
font-weight:bold;
}

</style>

</head>


<body>


<div class="navbar">

<div onclick="showPage('products')">Products</div>
<div onclick="showPage('lowstock')">Low Stock</div>
<div onclick="showPage('category')">Add Category</div>
<div onclick="showPage('addproduct')">Add Products</div>

</div>



<!-- PRODUCTS LIST -->

<div id="products" class="section active">

<h2>Products List</h2>

<div id="productList"></div>

</div>



<!-- ADD PRODUCT -->

<div id="addproduct" class="section">

<h2>Add Product</h2>

<input id="photo" type="text" placeholder="Upload Photo URL">

<input id="name" placeholder="Product Name">

<input id="code" placeholder="Product Code">

<select id="category"></select>

<input id="stock" type="number" placeholder="Total Stock">

<input id="purchase" type="number" placeholder="Purchase Price">

<input id="selling" type="number" placeholder="Selling Price">

<input id="mrp" type="number" placeholder="MRP">

<input id="lowstock" type="number" placeholder="Low Stock Alert Piece">

<button onclick="saveProduct()">Save Product</button>

</div>



<!-- LOW STOCK -->

<div id="lowstock" class="section">

<h2>Low Stock Products</h2>

<div id="lowStockList"></div>

</div>



<!-- CATEGORY -->

<div id="category" class="section">

<h2>Add Category</h2>

<input id="categoryName" placeholder="Category Name">

<button onclick="addCategory()">Save Category</button>

<div id="categoryList"></div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";



const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",
measurementId: "G-BHD1Z4TD7G"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);



window.showPage=function(page){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(page).classList.add("active")

}



async function loadCategory(){

const snapshot=await getDocs(collection(db,"category"))

const select=document.getElementById("category")

select.innerHTML=""

snapshot.forEach(doc=>{

let data=doc.data()

let option=document.createElement("option")
option.value=data.name
option.text=data.name

select.appendChild(option)

})

}



window.addCategory=async function(){

let name=document.getElementById("categoryName").value

if(name=="") return alert("Enter Category")

await addDoc(collection(db,"category"),{

name:name

})

alert("Category Added")

document.getElementById("categoryName").value=""

loadCategory()

}



window.saveProduct=async function(){

let data={

photo:photo.value,
name:name.value,
code:code.value,
category:category.value,
stock:Number(stock.value),
purchase:Number(purchase.value),
selling:Number(selling.value),
mrp:Number(mrp.value),
lowstock:Number(lowstock.value)

}

await addDoc(collection(db,"products"),data)

alert("Product Saved")

loadProducts()

}



async function loadProducts(){

const snapshot=await getDocs(collection(db,"products"))

let html=""

snapshot.forEach(doc=>{

let p=doc.data()

html+=`

<div class="product">

<b>${p.name}</b><br>

Stock: ${p.stock}

</div>

`

})

document.getElementById("productList").innerHTML=html

}



async function loadLowStock(){

const snapshot=await getDocs(collection(db,"products"))

let html=""

snapshot.forEach(doc=>{

let p=doc.data()

if(p.stock <= p.lowstock){

html+=`

<div class="product low">

${p.name} <br>

Stock Left: ${p.stock}

</div>

`

}

})

document.getElementById("lowStockList").innerHTML=html

}



loadCategory()
loadProducts()
loadLowStock()

</script>

</body>
</html>
