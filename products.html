<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#6fb7d6,#d6efd6);
padding:15px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.addBtn{
background:#f7b955;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.searchBox{
margin-top:20px;
background:#7ed08d;
padding:10px;
border-radius:30px;
}

.searchBox input{
width:90%;
border:none;
background:none;
font-size:16px;
outline:none;
}

.product{
margin-top:20px;
padding:15px;
border-radius:20px;
background:linear-gradient(90deg,#7f5af0,#00c16e);
color:white;
display:flex;
align-items:center;
gap:15px;
}

.product img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
background:white;
}

.info{
flex:1;
}

.actions button{
margin-right:5px;
padding:5px 10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.delete{
background:red;
color:white;
}

.edit{
background:#ffc107;
}

.addPage{
display:none;
margin-top:20px;
}

.addPage input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

.saveBtn{
background:#f7b955;
padding:12px;
border:none;
width:100%;
border-radius:10px;
font-size:16px;
}

</style>
</head>

<body>

<div class="top">

<h2>Products List</h2>

<div class="addBtn" onclick="openAdd()">+ Add Products</div>

</div>


<div class="searchBox">
<input type="text" id="search" placeholder="Search Name/Code" onkeyup="searchProduct()">
</div>


<div id="productList"></div>


<!-- ADD PRODUCT PAGE -->

<div class="addPage" id="addPage">

<h2>Add Products</h2>

<input type="file" id="image">

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="code" placeholder="Product Code">

<input type="number" id="stock" placeholder="Stock">

<input type="number" id="price" placeholder="Selling Price">

<button class="saveBtn" onclick="addProduct()">Save</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { getStorage,ref,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";


const firebaseConfig = {

apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",

authDomain: "mywebapp-93636.firebaseapp.com",

projectId: "mywebapp-93636",

storageBucket: "mywebapp-93636.firebasestorage.app",

messagingSenderId: "644012557966",

appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const storage = getStorage(app);

let userId="";


onAuthStateChanged(auth,(user)=>{

if(user){

userId=user.uid;

loadProducts();

}else{

window.location="login.html";

}

});


window.openAdd=function(){

document.getElementById("addPage").style.display="block";

}


window.addProduct = async function(){

const name=document.getElementById("name").value;

const code=document.getElementById("code").value;

const stock=document.getElementById("stock").value;

const price=document.getElementById("price").value;

const file=document.getElementById("image").files[0];

if(!name || !stock || !price){

alert("Fill all fields");

return;

}

let imageUrl="";

if(file){

const storageRef=ref(storage,"products/"+Date.now()+file.name);

await uploadBytes(storageRef,file);

imageUrl=await getDownloadURL(storageRef);

}


await addDoc(collection(db,"users",userId,"products"),{

name:name,

code:code,

stock:stock,

price:price,

image:imageUrl

});

alert("Product Added");

loadProducts();

}


async function loadProducts(){

const list=document.getElementById("productList");

list.innerHTML="";

const querySnapshot=await getDocs(collection(db,"users",userId,"products"));

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();

list.innerHTML+=`

<div class="product">

<img src="${data.image}">

<div class="info">

<b>${data.name}</b>

<br>

Code: ${data.code}

<br>

Stock: ${data.stock}

<br>

Price: ${data.price}৳

</div>

<div class="actions">

<button class="delete" onclick="deleteProduct('${docSnap.id}')">Delete</button>

</div>

</div>

`;

});

}


window.deleteProduct = async function(id){

await deleteDoc(doc(db,"users",userId,"products",id));

loadProducts();

}


window.searchProduct=function(){

const input=document.getElementById("search").value.toLowerCase();

const products=document.getElementsByClassName("product");

for(let i=0;i<products.length;i++){

let text=products[i].innerText.toLowerCase();

products[i].style.display=text.includes(input)?"flex":"none";

}

}

</script>

</body>
</html>
