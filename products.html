<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Products List</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eaf5ec;
}

/* HEADER */

.header{
background:linear-gradient(90deg,#2d8cff,#1bc6a6);
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.addBtn{
background:#ffb100;
border:none;
padding:10px 18px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

/* SEARCH AREA */

.searchArea{
display:flex;
align-items:center;
padding:20px;
gap:10px;
}

.searchBox{
flex:1;
display:flex;
align-items:center;
background:#6ed38c;
border-radius:30px;
padding:10px 15px;
}

.searchBox input{
border:none;
background:none;
outline:none;
width:100%;
font-size:16px;
color:white;
}

.searchIcon{
background:#2d8cff;
color:white;
padding:10px;
border-radius:50%;
margin-right:10px;
}

/* VIEW BUTTON */

.viewBtns button{
background:#2d8cff;
color:white;
border:none;
padding:10px;
margin-left:5px;
cursor:pointer;
}

/* PRODUCT LIST */

.products{
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-radius:20px;
background:linear-gradient(90deg,#7c59d8,#1bc6a6);
color:white;
}

/* LEFT */

.left{
display:flex;
gap:15px;
align-items:center;
}

.left img{
width:80px;
height:80px;
border-radius:10px;
cursor:pointer;
}

.productInfo h3{
margin:0;
}

.productInfo p{
margin:3px 0;
}

/* RIGHT */

.right p{
margin:4px 0;
}

.buttons button{
border:none;
padding:6px 12px;
border-radius:5px;
margin-top:5px;
cursor:pointer;
}

.edit{
background:#ffc107;
}

.delete{
background:#ff4d4d;
color:white;
}

/* IMAGE POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<div class="header">

<h2>Products List</h2>

<button class="addBtn">+ Add Products</button>

</div>


<div class="searchArea">

<div class="searchBox">

<div class="searchIcon">🔍</div>

<input type="text" placeholder="Search Name / Code / Category">

</div>

<div class="viewBtns">

<button onclick="listView()">List</button>
<button onclick="gridView()">Grid</button>

</div>

</div>



<div class="products" id="productList">


<div class="card">

<div class="left">

<img src="https://i.imgur.com/6RLQ1YH.png" onclick="showImage(this.src)">

<div class="productInfo">

<h3>Vaccum Flask 1L</h3>

<p>MRP: 120৳ | Sell: 100৳</p>

<p>Tap to image full view</p>

</div>

</div>


<div class="right">

<p>Code: 928552</p>

<p>Category: Flask</p>

<p>Stock: 52</p>

<div class="buttons">

<button class="edit">Edit</button>
<button class="delete">Delete</button>

</div>

</div>

</div>



<div class="card">

<div class="left">

<img src="https://i.imgur.com/7yUvePI.png" onclick="showImage(this.src)">

<div class="productInfo">

<h3>Mosquito Killing Bat</h3>

<p>MRP: 500৳ | Sell: 450৳</p>

<p>Tap to image full view</p>

</div>

</div>


<div class="right">

<p>Code: 934512</p>

<p>Category: Electric</p>

<p>Stock: 570</p>

<div class="buttons">

<button class="edit">Edit</button>
<button class="delete">Delete</button>

</div>

</div>

</div>


</div>



<div class="popup" id="popup" onclick="closePopup()">

<img id="popupImg">

</div>


<script>

function showImage(src){

document.getElementById("popup").style.display="flex"
document.getElementById("popupImg").src=src

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

function gridView(){

document.getElementById("productList").style.flexDirection="row"
document.getElementById("productList").style.flexWrap="wrap"

}

function listView(){

document.getElementById("productList").style.flexDirection="column"

}

</script>


</body>
</html>
