<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Products</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(#4da3c7,#b5e0b3);
}

.topbar{
display:flex;
justify-content:space-between;
padding:15px;
font-size:22px;
font-weight:bold;
}

.addbtn{
color:#ffcc66;
cursor:pointer;
}

.container{
padding:10px;
}

.search{
background:#7ed37a;
padding:12px;
border-radius:40px;
margin-bottom:15px;
}

.search input{
border:none;
background:transparent;
width:90%;
font-size:16px;
outline:none;
}

.card{
display:flex;
background:linear-gradient(90deg,#7d4cff,#0ecf83);
border-radius:20px;
padding:10px;
margin-bottom:15px;
color:black;
}

.card img{
width:70px;
height:90px;
border-radius:10px;
background:white;
object-fit:cover;
}

.info{
flex:1;
margin-left:10px;
}

.action{
margin-top:5px;
}

.action button{
border:none;
background:none;
font-size:16px;
margin-right:10px;
cursor:pointer;
}

.formbox{
display:none;
padding:15px;
}

.formbox input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:30px;
border:none;
background:linear-gradient(90deg,#7d4cff,#0ecf83);
color:black;
}

.savebtn{
margin-top:10px;
padding:12px;
background:#f4a94a;
border:none;
border-radius:30px;
font-size:18px;
width:100%;
}

.preview{
width:120px;
height:120px;
background:#aaa;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:10px;
overflow:hidden;
}

.preview img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div class="topbar">
<div>Products List</div>
<div class="addbtn" onclick="showForm()">+ Add Products</div>
</div>

<div class="container">

<div class="search">
<input id="search" placeholder="Search Name/Code/Category" onkeyup="searchProduct()">
</div>

<div id="productList"></div>

</div>


<div class="formbox" id="formbox">

<h2 style="text-align:center;color:#ffcc66">Add Products</h2>

<div class="preview" onclick="upload.click()">
<img id="previewImg">
</div>

<input type="file" id="upload">

<input id="name" placeholder="Product Name">
<input id="code" placeholder="Product Code">
<input id="category" placeholder="Category Name">
<input id="stock" placeholder="Total Stock">
<input id="purchase" placeholder="Purchase Price">
<input id="sell" placeholder="Selling Price">
<input id="mrp" placeholder="MRP">

<button class="savebtn" onclick="saveProduct()">Save</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore,collection,addDoc,onSnapshot,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.appspot.com",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const productList=document.getElementById("productList");

let imageBase64=""
let allProducts=[]

upload.onchange=()=>{

let file=upload.files[0]

let reader=new FileReader()

reader.onload=e=>{

imageBase64=e.target.result
previewImg.src=imageBase64

}

reader.readAsDataURL(file)

}



window.showForm=()=>{
document.getElementById("formbox").style.display="block"
window.scrollTo(0,document.body.scrollHeight)
}



window.saveProduct=async()=>{

let data={

name:name.value,
code:code.value,
category:category.value,
stock:stock.value,
purchase:purchase.value,
sell:sell.value,
mrp:mrp.value,
image:imageBase64

}

await addDoc(collection(db,"products"),data)

alert("Product Added")

location.reload()

}



onSnapshot(collection(db,"products"),(snap)=>{

productList.innerHTML=""
allProducts=[]

snap.forEach(docu=>{

let d=docu.data()
d.id=docu.id

allProducts.push(d)

showCard(d)

})

})



function showCard(d){

productList.innerHTML+=`

<div class="card">

<img src="${d.image||'https://via.placeholder.com/70'}" onclick="viewImage('${d.image}')">

<div class="info">

<b>${d.name}</b><br>

M.R.P ${d.mrp} | Sell ${d.sell}

<div class="action">

Code: ${d.code}<br>
Category: ${d.category}<br>
Stock: ${d.stock}

<br>

<button onclick="editProduct('${d.id}')">Edit</button>

<button onclick="deleteProduct('${d.id}')">Delete</button>

</div>

</div>

</div>

`

}



window.searchProduct=()=>{

let s=search.value.toLowerCase()

productList.innerHTML=""

allProducts.forEach(p=>{

if(
p.name.toLowerCase().includes(s)||
p.code.toLowerCase().includes(s)||
p.category.toLowerCase().includes(s)
){

showCard(p)

}

})

}



window.deleteProduct=async(id)=>{

await deleteDoc(doc(db,"products",id))

}



window.editProduct=async(id)=>{

let newName=prompt("Product Name")
let newPrice=prompt("Sell Price")
let newStock=prompt("Stock")

await updateDoc(doc(db,"products",id),{

name:newName,
sell:newPrice,
stock:newStock

})

}



window.viewImage=(img)=>{

if(!img)return

window.open(img)

}

</script>

</body>
</html>
