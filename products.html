<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{
font-family:Arial;
margin:0;
background:#cfe3c8;
}

/* HEADER */
.header{
background:linear-gradient(90deg,#2c7ecb,#2a9df4);
padding:15px;
display:flex;
justify-content:space-between;
color:#ffc55c;
font-size:20px;
font-weight:bold;
}

/* SEARCH */
.search{
margin:10px;
background:#7bd389;
padding:12px;
border-radius:30px;
}
.search input{
width:100%;
border:none;
background:none;
font-size:16px;
outline:none;
}

/* CATEGORY */
.cat-bar{
display:flex;
gap:8px;
overflow:auto;
padding:10px;
}
.cat{
background:#7bd389;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

/* VIEW */
.view{
display:flex;
gap:10px;
padding:10px;
}
.view button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#2c7ecb;
color:white;
}

/* CARD */
.card{
background:linear-gradient(90deg,#7b4ce2,#00a86b);
margin:10px;
padding:12px;
border-radius:20px;
display:flex;
gap:10px;
}
.card img{
width:70px;
height:70px;
border-radius:10px;
object-fit:cover;
cursor:pointer;
}
.info{flex:1;}
.title{font-size:18px;font-weight:bold;}
.right{text-align:right;}

/* GRID */
.grid .card{
flex-direction:column;
align-items:center;
text-align:center;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.form{
background:white;
padding:20px;
width:90%;
max-width:400px;
border-radius:10px;
}
.form input,.form select{
width:100%;
padding:10px;
margin:5px 0;
}

/* CATEGORY LIST */
#catList div{
display:flex;
justify-content:space-between;
background:#eee;
padding:8px;
margin-top:5px;
border-radius:6px;
}

/* IMAGE VIEW */
#imgView{
max-width:90%;
max-height:80%;
}
</style>
</head>

<body>

<div class="header">
<div>Products List</div>
<div onclick="openForm()">+ Add</div>
</div>

<div class="search">
<input id="search" placeholder="Search Name / Code / Category">
</div>

<div class="view">
<button onclick="setList()">List</button>
<button onclick="setGrid()">Grid</button>
<button onclick="openCat()">Category</button>
</div>

<div class="cat-bar" id="cats"></div>
<div id="list"></div>

<!-- PRODUCT MODAL -->
<div class="modal" id="modal">
<div class="form">

<h3>Add Product</h3>

<input type="file" id="image">
<input id="name" placeholder="Product Name">
<input id="code" placeholder="Product Code">
<select id="category"></select>

<input id="stock" placeholder="Stock">
<input id="buy" placeholder="Buy Price">
<input id="sell" placeholder="Sell Price">
<input id="mrp" placeholder="MRP">

<button onclick="save()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal" id="catModal">
<div class="form">

<h3>Category List</h3>

<input id="newCat" placeholder="New Category">
<button onclick="addCategory()">Add</button>

<div id="catList"></div>

<button onclick="closeCat()">Close</button>

</div>
</div>

<!-- IMAGE VIEW -->
<div class="modal" id="imgModal" onclick="this.style.display='none'">
<img id="imgView">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
query, where, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain:"mywebapp-93636.firebaseapp.com",
projectId:"mywebapp-93636"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let products=[];
let view="";

/* AUTH */
onAuthStateChanged(auth,(u)=>{
if(!u){
alert("Login first");
return;
}
user=u;
loadProducts();
loadCategory();
});

/* LOAD PRODUCTS */
function loadProducts(){
onSnapshot(query(collection(db,"products"), where("uid","==",user.uid)),snap=>{
products=[];
snap.forEach(d=>products.push({id:d.id,...d.data()}));
render(products);
});
}

/* LOAD CATEGORY */
function loadCategory(){
onSnapshot(query(collection(db,"categories"), where("uid","==",user.uid)),snap=>{
category.innerHTML="<option value=''>Select Category</option>";
cats.innerHTML="<div class='cat' onclick='filterCat(\"All\")'>All</div>";
catList.innerHTML="";

snap.forEach(d=>{
let c=d.data();

category.innerHTML+=`<option>${c.name}</option>`;
cats.innerHTML+=`<div class="cat" onclick='filterCat("${c.name}")'>${c.name}</div>`;

catList.innerHTML+=`
<div>
<span>${c.name}</span>
<button onclick="deleteCat('${d.id}')">Delete</button>
</div>`;
});
});
}

/* RENDER */
function render(data){
list.className=view;
list.innerHTML="";

data.forEach(p=>{
list.innerHTML+=`
<div class="card">

<img src="${p.img || 'https://via.placeholder.com/70'}"
onclick="viewImg('${p.img}')">

<div class="info">
<div class="title">${p.name}</div>
MRP: ${p.mrp} | Sell: ${p.sell}
<br>Code: ${p.code}
<br>Category: ${p.category}
</div>

<div class="right">
Stock: ${p.stock}
</div>

</div>`;
});
}

/* IMAGE VIEW */
window.viewImg=(src)=>{
if(!src) return;
imgView.src=src;
imgModal.style.display="flex";
};

/* SEARCH */
search.oninput=function(){
let v=this.value.toLowerCase();
render(products.filter(p=>
(p.name||"").toLowerCase().includes(v) ||
(p.code||"").includes(v) ||
(p.category||"").toLowerCase().includes(v)
));
};

/* FILTER */
window.filterCat=(c)=>{
if(c=="All") render(products);
else render(products.filter(p=>p.category==c));
};

/* VIEW */
window.setGrid=()=>{view="grid";render(products);}
window.setList=()=>{view="";render(products);}

/* FORM */
window.openForm=()=>{modal.style.display="flex";}
window.closeForm=()=>{modal.style.display="none";}

/* CATEGORY */
window.openCat=()=>{catModal.style.display="flex";}
window.closeCat=()=>{catModal.style.display="none";}

/* ADD CATEGORY */
window.addCategory=async()=>{
if(!newCat.value) return alert("Enter category");

await addDoc(collection(db,"categories"),{
name:newCat.value,
uid:user.uid
});

newCat.value="";
};

/* DELETE CATEGORY */
window.deleteCat=async(id)=>{
if(confirm("Delete?")){
await deleteDoc(doc(db,"categories",id));
}
};

/* SAVE PRODUCT (🔥 FIXED) */
window.save=async()=>{

if(!name.value || !code.value || !category.value){
alert("Fill required");
return;
}

let img="";

/* READ IMAGE PROPERLY */
if(image.files.length > 0){
const reader = new FileReader();

reader.onload = async function(e){

img = e.target.result;

await addDoc(collection(db,"products"),{
name:name.value,
code:code.value,
category:category.value,
stock:Number(stock.value||0),
buy:Number(buy.value||0),
sell:Number(sell.value||0),
mrp:Number(mrp.value||0),
img:img,
uid:user.uid
});

closeForm();
};

reader.readAsDataURL(image.files[0]);

}else{

await addDoc(collection(db,"products"),{
name:name.value,
code:code.value,
category:category.value,
stock:Number(stock.value||0),
buy:Number(buy.value||0),
sell:Number(sell.value||0),
mrp:Number(mrp.value||0),
img:"",
uid:user.uid
});

closeForm();
}

};

</script>

</body>
</html>
