<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products Manager</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#333;
padding:10px;
display:flex;
gap:10px;
justify-content:center;
}

nav button{
padding:10px 15px;
border:none;
background:#4CAF50;
color:white;
cursor:pointer;
}

section{
display:none;
padding:20px;
}

.active{
display:block;
}

input,select{
padding:10px;
margin:5px;
width:200px;
}

button{
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table,th,td{
border:1px solid #ddd;
}

th,td{
padding:10px;
text-align:center;
}

img{
width:60px;
}

.card{
background:white;
padding:20px;
margin:10px;
display:inline-block;
}

</style>
</head>
<body>

<header>
<h2>📦 Products Management System</h2>
</header>

<nav>

<button onclick="showPage('dashboard')">Dashboard</button>

<button onclick="showPage('add')">Add Product</button>

<button onclick="showPage('products')">Products</button>

<button onclick="showPage('lowstock')">Low Stock</button>

</nav>


<!-- DASHBOARD -->

<section id="dashboard" class="active">

<h2>Dashboard</h2>

<div class="card">
<h3>Total Products</h3>
<p id="totalProducts">0</p>
</div>

<div class="card">
<h3>Low Stock</h3>
<p id="lowProducts">0</p>
</div>

</section>



<!-- ADD PRODUCT -->

<section id="add">

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="stock" placeholder="Stock">

<select id="category">

<option>Electronics</option>
<option>Clothing</option>
<option>Food</option>

</select>

<input type="file" id="image">

<br><br>

<button onclick="addProduct()">Add Product</button>

</section>



<!-- PRODUCTS LIST -->

<section id="products">

<h2>Products List</h2>

<select onchange="filterCategory(this.value)">
<option value="all">All</option>
<option value="Electronics">Electronics</option>
<option value="Clothing">Clothing</option>
<option value="Food">Food</option>
</select>

<table>

<thead>

<tr>
<th>Image</th>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Category</th>
<th>Action</th>
</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</section>



<!-- LOW STOCK -->

<section id="lowstock">

<h2>Low Stock Products</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Stock</th>
</tr>

</thead>

<tbody id="lowTable">

</tbody>

</table>

</section>




<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_DOMAIN",

projectId: "YOUR_PROJECT",

storageBucket: "YOUR_BUCKET",

messagingSenderId: "ID",

appId: "APP_ID"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);



window.showPage = function(page){

document.querySelectorAll("section").forEach(s=>{

s.classList.remove("active")

})

document.getElementById(page).classList.add("active")

}



async function addProduct(){

const name = document.getElementById("name").value

const price = document.getElementById("price").value

const stock = document.getElementById("stock").value

const category = document.getElementById("category").value

const file = document.getElementById("image").files[0]

let imageUrl=""

if(file){

const storageRef = ref(storage,"products/"+file.name)

await uploadBytes(storageRef,file)

imageUrl = await getDownloadURL(storageRef)

}

await addDoc(collection(db,"products"),{

name,price,stock,category,image:imageUrl

})

alert("Product Added")

loadProducts()

}



async function loadProducts(){

const snapshot = await getDocs(collection(db,"products"))

const table = document.getElementById("productTable")

table.innerHTML=""

let total=0

let low=0

snapshot.forEach(docu=>{

const data = docu.data()

total++

if(data.stock<5) low++

table.innerHTML+=`

<tr>

<td><img src="${data.image}"></td>

<td>${data.name}</td>

<td>${data.price}</td>

<td>${data.stock}</td>

<td>${data.category}</td>

<td>

<button onclick="deleteProduct('${docu.id}')">Delete</button>

</td>

</tr>

`

})

document.getElementById("totalProducts").innerText=total

document.getElementById("lowProducts").innerText=low

}



window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id))

loadProducts()

}



window.filterCategory = async function(cat){

const snapshot = await getDocs(collection(db,"products"))

const table = document.getElementById("productTable")

table.innerHTML=""

snapshot.forEach(docu=>{

const d = docu.data()

if(cat=="all" || d.category==cat){

table.innerHTML+=`

<tr>

<td><img src="${d.image}"></td>

<td>${d.name}</td>

<td>${d.price}</td>

<td>${d.stock}</td>

<td>${d.category}</td>

<td>

<button onclick="deleteProduct('${docu.id}')">Delete</button>

</td>

</tr>

`

}

})

}



async function loadLowStock(){

const snapshot = await getDocs(collection(db,"products"))

const table = document.getElementById("lowTable")

table.innerHTML=""

snapshot.forEach(docu=>{

const d=docu.data()

if(d.stock<5){

table.innerHTML+=`

<tr>

<td>${d.name}</td>

<td>${d.stock}</td>

</tr>

`

}

})

}



loadProducts()

loadLowStock()

</script>

</body>
</html>
