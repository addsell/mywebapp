<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Products List</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e8f5e9;
}

/* Header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:linear-gradient(90deg,#1e88e5,#26c6da);
color:white;
}

.addBtn{
background:#ffb300;
border:none;
padding:12px 18px;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

/* Search */

.searchBox{
padding:15px;
}

.searchBox input{
width:100%;
padding:14px;
border-radius:30px;
border:none;
font-size:16px;
}

/* Products */

.products{
padding:15px;
display:flex;
flex-direction:column;
gap:20px;
}

/* Card */

.card{
display:flex;
justify-content:space-between;
background:linear-gradient(90deg,#7e57c2,#26a69a);
padding:15px;
border-radius:20px;
color:white;
}

.left{
display:flex;
gap:15px;
}

.left img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
cursor:pointer;
}

.right{
text-align:right;
}

.btn{
margin-top:10px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.edit{
background:#ffca28;
}

.delete{
background:#e53935;
color:white;
}

/* Image popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
}

.popup img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<!-- Header -->

<div class="header">
<h2>Products List</h2>
<button class="addBtn" onclick="location.href='addproduct.html'">+ Add Products</button>
</div>

<!-- Search -->

<div class="searchBox">
<input type="text" placeholder="Search Name / Code / Category" onkeyup="searchProduct(this.value)">
</div>

<!-- Products -->

<div class="products" id="products"></div>

<!-- Image popup -->

<div class="popup" id="popup" onclick="closePopup()">
<img id="popupImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { getAuth,onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId=null;

onAuthStateChanged(auth,(user)=>{

if(user){
userId=user.uid;
loadProducts();
}

});

/* Load products */

async function loadProducts(){

const snap = await getDocs(collection(db,"users",userId,"products"));

const container = document.getElementById("products");

container.innerHTML="";

snap.forEach((docu)=>{

const p = docu.data();

container.innerHTML+=`

<div class="card">

<div class="left">

<img src="${p.image}" onclick="showImage('${p.image}')">

<div>

<h3>${p.name}</h3>

<p>MRP: ${p.mrp}৳ | Sell: ${p.sell}৳</p>

</div>

</div>

<div class="right">

<p>Code: ${p.code}</p>

<p>Category: ${p.category}</p>

<p>Stock: ${p.stock}</p>

<button class="btn edit">Edit</button>
<button class="btn delete" onclick="deleteProduct('${docu.id}')">Delete</button>

</div>

</div>

`;

});

}

/* Delete */

window.deleteProduct = async(id)=>{

await deleteDoc(doc(db,"users",userId,"products",id));

loadProducts();

}

/* Image popup */

window.showImage=(src)=>{

document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src=src;

}

window.closePopup=()=>{

document.getElementById("popup").style.display="none";

}

/* Search */

window.searchProduct=(text)=>{

text=text.toLowerCase();

const cards=document.querySelectorAll(".card");

cards.forEach(c=>{

if(c.innerText.toLowerCase().includes(text)){

c.style.display="flex";

}else{

c.style.display="none";

}

});

}

</script>

</body>
</html>
