<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{
font-family:Arial;
margin:0;
background:#cfe3c8;
}

/* HEADER */
.header{
background:linear-gradient(90deg,#2c7ecb,#2a9df4);
padding:15px;
display:flex;
justify-content:space-between;
color:#ffc55c;
font-size:22px;
font-weight:bold;
}

/* SEARCH */
.search{
margin:10px;
background:#7bd389;
padding:12px;
border-radius:30px;
}

.search input{
width:100%;
border:none;
background:none;
font-size:16px;
}

/* CATEGORY */
.cat-bar{
display:flex;
gap:8px;
overflow:auto;
padding:10px;
}

.cat{
background:#7bd389;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

/* VIEW BUTTON */
.view{
display:flex;
gap:10px;
padding:10px;
}

.view button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#2c7ecb;
color:white;
}

/* CARD */
.card{
background:linear-gradient(90deg,#7b4ce2,#00a86b);
margin:10px;
padding:12px;
border-radius:20px;
color:black;
display:flex;
gap:10px;
}

.card img{
width:70px;
height:70px;
border-radius:10px;
object-fit:cover;
}

.info{
flex:1;
}

.title{
font-size:20px;
}

.right{
text-align:right;
}

.actions button{
margin:5px;
padding:5px 10px;
}

/* GRID */
.grid .card{
flex-direction:column;
align-items:center;
text-align:center;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.form{
background:white;
padding:20px;
width:90%;
max-width:400px;
border-radius:10px;
}

.form input, .form select{
width:100%;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<div class="header">
<div>Products List</div>
<div onclick="openForm()">+ Add</div>
</div>

<div class="search">
<input id="search" placeholder="Search Name / Code / Category">
</div>

<div class="view">
<button onclick="setList()">List</button>
<button onclick="setGrid()">Grid</button>
</div>

<div class="cat-bar" id="cats"></div>

<div id="list"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="form">

<h3>Add Product</h3>

<input type="file" id="image">
<input id="name" placeholder="Product Name">
<input id="code" placeholder="Product Code">
<select id="category"></select>

<input id="stock" placeholder="Stock">
<input id="buy" placeholder="Buy Price">
<input id="sell" placeholder="Sell Price">
<input id="mrp" placeholder="MRP">

<button onclick="save()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
query, where
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain:"mywebapp-93636.firebaseapp.com",
projectId:"mywebapp-93636"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let products=[];
let view="list";

/* AUTH */
onAuthStateChanged(auth,(u)=>{
if(!u){
location.href="login.html";
return;
}
user=u;
loadProducts();
loadCategory();
});

/* LOAD PRODUCTS */
function loadProducts(){
onSnapshot(query(collection(db,"products"), where("uid","==",user.uid)),snap=>{
products=[];
snap.forEach(d=>products.push(d.data()));
render(products);
});
}

/* LOAD CATEGORY */
function loadCategory(){
onSnapshot(query(collection(db,"categories"), where("uid","==",user.uid)),snap=>{
category.innerHTML="";
cats.innerHTML="<div class='cat' onclick='filterCat(\"All\")'>All</div>";

snap.forEach(d=>{
let c=d.data().name;

category.innerHTML+=`<option>${c}</option>`;
cats.innerHTML+=`<div class="cat" onclick='filterCat("${c}")'>${c}</div>`;
});
});
}

/* RENDER */
function render(data){
list.className=view;
list.innerHTML="";

data.forEach(p=>{
list.innerHTML+=`
<div class="card">

<img src="https://via.placeholder.com/70">

<div class="info">
<div class="title">${p.name}</div>
MRP: ${p.mrp} | Sell: ${p.sell}
<br>Code: ${p.code}
<br>Category: ${p.category}
</div>

<div class="right">
Stock: ${p.stock}<br>
<div class="actions">
<button>Edit</button>
<button>Delete</button>
</div>
</div>

</div>
`;
});
}

/* SEARCH */
search.oninput=function(){
let v=this.value.toLowerCase();
render(products.filter(p=>
p.name.toLowerCase().includes(v) ||
p.code.includes(v) ||
p.category.toLowerCase().includes(v)
));
};

/* FILTER */
window.filterCat=(c)=>{
if(c=="All"){
render(products);
}else{
render(products.filter(p=>p.category==c));
}
};

/* VIEW */
window.setGrid=()=>{view="grid";render(products);}
window.setList=()=>{view="";render(products);}

/* FORM */
window.openForm=()=>{modal.style.display="flex";}
window.closeForm=()=>{modal.style.display="none";}

/* SAVE */
window.save=async()=>{
if(!name.value || !code.value){
alert("Fill required");
return;
}

await addDoc(collection(db,"products"),{
name:name.value,
code:code.value,
category:category.value,
stock:Number(stock.value||0),
buy:Number(buy.value||0),
sell:Number(sell.value||0),
mrp:Number(mrp.value||0),
uid:user.uid
});

closeForm();
};

</script>

</body>
</html>
