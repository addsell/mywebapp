<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Products</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f2f5f9;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.addBtn{
background:#4CAF50;
color:white;
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* SEARCH */

.searchBox{
margin:10px;
}

.searchBox input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

/* PRODUCT GRID */

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:10px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
}

.product h4{
margin:5px 0;
}

.btns{
display:flex;
justify-content:space-between;
margin-top:5px;
}

.edit{
background:#2196F3;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
}

.delete{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup img{
max-width:90%;
max-height:90%;
}

/* ADD PRODUCT MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#fff;
display:none;
overflow:auto;
padding:20px;
}

.modal input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

.saveBtn{
background:#4CAF50;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:6px;
}

</style>
</head>

<body>

<div class="header">
<h2>Products</h2>
<button class="addBtn" onclick="openAdd()">Add Product</button>
</div>

<div class="searchBox">
<input type="text" placeholder="Search product..." onkeyup="searchProduct(this.value)">
</div>

<div class="products" id="products"></div>

<!-- IMAGE POPUP -->

<div class="popup" id="popup" onclick="closePopup()">
<img id="popupImg">
</div>

<!-- ADD PRODUCT PAGE -->

<div class="modal" id="addModal">

<h2>Add Product</h2>

<input type="file" id="photo">

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="code" placeholder="Product Code">

<select id="category">
<option>General</option>
<option>Electronics</option>
<option>Clothing</option>
</select>

<input type="number" id="stock" placeholder="Total Stock">

<input type="number" id="purchase" placeholder="Purchase Price">

<input type="number" id="sell" placeholder="Sell Price">

<input type="number" id="mrp" placeholder="MRP">

<button class="saveBtn" onclick="saveProduct()">Save Product</button>

</div>


<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getAuth,onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
getFirestore,collection,addDoc,getDocs,doc,deleteDoc,updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT",

};

const app = initializeApp(firebaseConfig);

const auth = getAuth();

const db = getFirestore();

let currentUser=null;

onAuthStateChanged(auth,(user)=>{

if(user){

currentUser=user;

loadProducts();

}

});


/* SAVE PRODUCT */

async function saveProduct(){

let name=document.getElementById("name").value;
let code=document.getElementById("code").value;
let category=document.getElementById("category").value;
let stock=document.getElementById("stock").value;
let purchase=document.getElementById("purchase").value;
let sell=document.getElementById("sell").value;
let mrp=document.getElementById("mrp").value;

await addDoc(collection(db,"products"),{

uid:currentUser.uid,
name,
code,
category,
stock,
purchase,
sell,
mrp,
image:"https://via.placeholder.com/200"

});

loadProducts();

document.getElementById("addModal").style.display="none";

}


/* LOAD PRODUCTS */

async function loadProducts(){

let container=document.getElementById("products");

container.innerHTML="";

const querySnapshot = await getDocs(collection(db,"products"));

querySnapshot.forEach((docu)=>{

let p=docu.data();

if(p.uid!==currentUser.uid) return;

container.innerHTML+=`

<div class="product">

<img src="${p.image}" onclick="showImage('${p.image}')">

<h4>${p.name}</h4>

<p>Stock: ${p.stock}</p>

<div class="btns">

<button class="edit">Edit</button>

<button class="delete" onclick="deleteProduct('${docu.id}')">Delete</button>

</div>

</div>

`;

});

}


/* DELETE */

window.deleteProduct=async(id)=>{

await deleteDoc(doc(db,"products",id));

loadProducts();

}


/* IMAGE POPUP */

window.showImage=(src)=>{

document.getElementById("popup").style.display="flex";

document.getElementById("popupImg").src=src;

}

window.closePopup=()=>{

document.getElementById("popup").style.display="none";

}


/* SEARCH */

window.searchProduct=(txt)=>{

let items=document.querySelectorAll(".product");

items.forEach(i=>{

let name=i.innerText.toLowerCase();

i.style.display=name.includes(txt.toLowerCase())?"block":"none";

});

}


/* OPEN ADD */

window.openAdd=()=>{

document.getElementById("addModal").style.display="block";

}

</script>

</body>
</html>
