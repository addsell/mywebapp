<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{font-family:Arial;margin:0;background:#cfe3c8}

.header{
background:linear-gradient(90deg,#2c7ecb,#2a9df4);
padding:15px;
display:flex;
justify-content:space-between;
color:#ffc55c;
font-size:20px;
font-weight:bold;
}

.search{
margin:10px;
background:#7bd389;
padding:12px;
border-radius:30px;
}
.search input{
width:100%;
border:none;
background:none;
font-size:16px;
outline:none;
}

.cat-bar{
display:flex;
gap:8px;
overflow:auto;
padding:10px;
}
.cat{
background:#7bd389;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.view{
display:flex;
gap:10px;
padding:10px;
}
.view button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#2c7ecb;
color:white;
}

.card{
background:linear-gradient(90deg,#7b4ce2,#00a86b);
margin:10px;
padding:12px;
border-radius:20px;
display:flex;
gap:10px;
}
.card img{
width:70px;height:70px;
border-radius:10px;
object-fit:cover;
}
.info{flex:1;}
.title{font-size:18px;font-weight:bold;}
.right{text-align:right;}

.grid .card{
flex-direction:column;
align-items:center;
text-align:center;
}

.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.form{
background:white;
padding:20px;
width:90%;
max-width:400px;
border-radius:10px;
}
.form input,.form select{
width:100%;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<div class="header">
<div>Products List</div>
<div onclick="openForm()">+ Add</div>
</div>

<div class="search">
<input id="search" placeholder="Search...">
</div>

<div class="view">
<button onclick="setList()">List</button>
<button onclick="setGrid()">Grid</button>
<button onclick="openCat()">Category</button>
</div>

<div class="cat-bar" id="cats"></div>
<div id="list"></div>

<!-- PRODUCT MODAL -->
<div class="modal" id="modal">
<div class="form">

<h3>Add Product</h3>

<input type="file" id="image">
<input id="name" placeholder="Name">
<input id="code" placeholder="Code">

<select id="category">
<option value="">Select Category</option>
</select>

<input id="stock" placeholder="Stock">
<input id="buy" placeholder="Buy">
<input id="sell" placeholder="Sell">
<input id="mrp" placeholder="MRP">

<button onclick="save()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal" id="catModal">
<div class="form">

<h3>Category</h3>

<input id="newCat" placeholder="New Category">
<button onclick="addCategory()">Add</button>

<div id="catList"></div>

<button onclick="closeCat()">Close</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
query, where, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let products=[];
let view="";

/* AUTH */
onAuthStateChanged(auth,(u)=>{
if(!u){ alert("Login first"); return; }
user=u;
loadProducts();
loadCategory();
});

/* LOAD PRODUCTS */
function loadProducts(){
onSnapshot(query(collection(db,"products"), where("uid","==",user.uid)),snap=>{
products=[];
snap.forEach(d=>products.push(d.data()));
render(products);
});
}

/* LOAD CATEGORY */
function loadCategory(){
onSnapshot(query(collection(db,"categories"), where("uid","==",user.uid)),snap=>{
category.innerHTML=`<option value="">Select Category</option>`;
cats.innerHTML=`<div class='cat' onclick='filterCat("All")'>All</div>`;
catList.innerHTML="";

snap.forEach(d=>{
let c=d.data();

category.innerHTML+=`<option value="${c.name}">${c.name}</option>`;
cats.innerHTML+=`<div class="cat" onclick='filterCat("${c.name}")'>${c.name}</div>`;

catList.innerHTML+=`
<div>
${c.name}
<button onclick="deleteCat('${d.id}')">X</button>
</div>`;
});
});
}

/* RENDER */
function render(data){
list.className=view;
list.innerHTML="";
data.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img || 'https://via.placeholder.com/70'}">
<div class="info">
<div class="title">${p.name}</div>
MRP: ${p.mrp} | Sell: ${p.sell}
<br>Code: ${p.code}
<br>${p.category}
</div>
<div class="right">
Stock: ${p.stock}
</div>
</div>`;
});
}

/* SEARCH */
search.oninput=function(){
let v=this.value.toLowerCase();
render(products.filter(p=>
(p.name||"").toLowerCase().includes(v) ||
(p.code||"").includes(v) ||
(p.category||"").toLowerCase().includes(v)
));
};

/* FILTER */
window.filterCat=(c)=>{
if(c=="All") render(products);
else render(products.filter(p=>p.category==c));
};

/* VIEW */
window.setGrid=()=>{view="grid";render(products);}
window.setList=()=>{view="";render(products);}

/* MODAL */
window.openForm=()=>modal.style.display="flex";
window.closeForm=()=>modal.style.display="none";

window.openCat=()=>catModal.style.display="flex";
window.closeCat=()=>catModal.style.display="none";

/* ADD CATEGORY */
window.addCategory=async()=>{
if(!newCat.value.trim()) return alert("Enter category");

await addDoc(collection(db,"categories"),{
name:newCat.value.trim(),
uid:user.uid
});

newCat.value="";
};

/* DELETE CATEGORY */
window.deleteCat=async(id)=>{
if(confirm("Delete?")){
await deleteDoc(doc(db,"categories",id));
}
};

/* CLEAR FORM */
function clearForm(){
name.value="";
code.value="";
stock.value="";
buy.value="";
sell.value="";
mrp.value="";
image.value="";
category.value="";
}

/* SAVE PRODUCT */
window.save=async()=>{

if(!user) return alert("Login required");

if(!name.value.trim()) return alert("Name required");
if(!code.value.trim()) return alert("Code required");
if(!category.value) return alert("Select category");

try{

let img="";

if(image.files.length>0){

const reader=new FileReader();

reader.onload=async(e)=>{

try{
img=e.target.result;

await addDoc(collection(db,"products"),{
name:name.value.trim(),
code:code.value.trim(),
category:category.value,
stock:Number(stock.value||0),
buy:Number(buy.value||0),
sell:Number(sell.value||0),
mrp:Number(mrp.value||0),
img:img,
uid:user.uid
});

alert("Saved ✅");
clearForm();
closeForm();

}catch(err){
alert(err.message);
}
};

reader.readAsDataURL(image.files[0]);

}else{

await addDoc(collection(db,"products"),{
name:name.value.trim(),
code:code.value.trim(),
category:category.value,
stock:Number(stock.value||0),
buy:Number(buy.value||0),
sell:Number(sell.value||0),
mrp:Number(mrp.value||0),
img:"",
uid:user.uid
});

alert("Saved ✅");
clearForm();
closeForm();
}

}catch(err){
alert("Error: "+err.message);
}

};

</script>

</body>
</html>
