<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#9fd3a7,#cde7d1);
padding:15px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
font-size:28px;
font-weight:bold;
margin-bottom:15px;
}

.addBtn{
color:#f7b955;
font-size:22px;
cursor:pointer;
}

/* SEARCH */

.searchBox{
background:#7ed08d;
padding:15px;
border-radius:40px;
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.searchBox input{
border:none;
background:none;
font-size:18px;
outline:none;
width:100%;
}

/* PRODUCT CARD */

.product{
display:flex;
gap:15px;
padding:15px;
border-radius:25px;
margin-bottom:15px;
background:linear-gradient(90deg,#7f5af0,#00c16e);
color:white;
}

.product img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
background:white;
}

.info{
flex:1;
}

.actions button{
margin-right:10px;
border:none;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
}

.edit{
background:#ffc107;
}

.delete{
background:red;
color:white;
}

/* ADD PAGE */

.addPage{
display:none;
}

.formBox{
margin-top:20px;
}

.formBox input,
.formBox select{

width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:30px;
background:linear-gradient(90deg,#7f5af0,#00c16e);
color:black;
font-size:16px;
}

.saveBtn{
background:#f7b955;
border:none;
padding:15px;
border-radius:30px;
width:150px;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- PRODUCT LIST PAGE -->

<div id="listPage">

<div class="header">

Products List

<div class="addBtn" onclick="openAdd()">+ Add Products</div>

</div>


<div class="searchBox">

🔍 <input type="text" id="search" placeholder="Search Name/Code/Category" onkeyup="searchProduct()">

</div>


<div id="productList"></div>

</div>


<!-- ADD PRODUCT PAGE -->

<div id="addPage" class="addPage">

<h2>Add Products</h2>

<input type="file" id="image">

<div class="formBox">

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="code" placeholder="Product Code">

<select id="category">

<option value="">Select Category</option>

<option>Flask</option>

<option>Electric</option>

<option>Plastic</option>

</select>

<input type="number" id="stock" placeholder="Total Stock Piece">

<input type="number" id="purchase" placeholder="Purchase Price">

<input type="number" id="price" placeholder="Selling Price">

<input type="number" id="mrp" placeholder="MRP">

</div>

<button class="saveBtn" onclick="saveProduct()">Save</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


import {

getStorage,
ref,
uploadBytes,
getDownloadURL

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";


const firebaseConfig={

apiKey:"AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",

authDomain:"mywebapp-93636.firebaseapp.com",

projectId:"mywebapp-93636",

storageBucket:"mywebapp-93636.firebasestorage.app",

messagingSenderId:"644012557966",

appId:"1:644012557966:web:aee6cc2a2621c41cf7ebdf"

};


const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

const storage=getStorage(app);


let userId="";
let products=[];



onAuthStateChanged(auth,(user)=>{

if(user){

userId=user.uid;

loadProducts();

}else{

window.location="login.html";

}

});


window.openAdd=function(){

document.getElementById("listPage").style.display="none";

document.getElementById("addPage").style.display="block";

}


window.saveProduct=async function(){

const name=document.getElementById("name").value;

const code=document.getElementById("code").value;

const category=document.getElementById("category").value;

const stock=document.getElementById("stock").value;

const purchase=document.getElementById("purchase").value;

const price=document.getElementById("price").value;

const mrp=document.getElementById("mrp").value;

const file=document.getElementById("image").files[0];


if(!name||!stock||!price){

alert("Fill all fields");

return;

}


let imageUrl="";

if(file){

const storageRef=ref(storage,"products/"+Date.now()+file.name);

await uploadBytes(storageRef,file);

imageUrl=await getDownloadURL(storageRef);

}


await addDoc(collection(db,"users",userId,"products"),{

name:name,

code:code,

category:category,

stock:stock,

purchase:purchase,

price:price,

mrp:mrp,

image:imageUrl

});


alert("Product Added");

location.reload();

}


async function loadProducts(){

const list=document.getElementById("productList");

list.innerHTML="";

const querySnapshot=await getDocs(collection(db,"users",userId,"products"));

querySnapshot.forEach((docSnap)=>{

const d=docSnap.data();

products.push(d);


list.innerHTML+=`

<div class="product">

<img src="${d.image}">

<div class="info">

<h3>${d.name}</h3>

M.R.P: ${d.mrp}৳ Sell Rate: ${d.price}৳<br>

Code: ${d.code}<br>

Category: ${d.category}<br>

Stock: ${d.stock} Piece

</div>

<div class="actions">

<button class="delete" onclick="deleteProduct('${docSnap.id}')">Delete</button>

</div>

</div>

`;

});

}


window.deleteProduct=async function(id){

await deleteDoc(doc(db,"users",userId,"products",id));

location.reload();

}


window.searchProduct=function(){

const input=document.getElementById("search").value.toLowerCase();

const products=document.getElementsByClassName("product");


for(let i=0;i<products.length;i++){

let text=products[i].innerText.toLowerCase();

products[i].style.display=text.includes(input)?"flex":"none";

}

}

</script>

</body>
</html>
