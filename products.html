<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products Manager</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#6fb7d6,#d6efd6);
padding:15px;
}

/* TOP BAR */

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.addBtn{
background:#f7b955;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* SEARCH */

.searchBox{
margin-top:20px;
background:#7ed08d;
padding:12px;
border-radius:30px;
}

.searchBox input{
width:90%;
border:none;
background:none;
font-size:16px;
outline:none;
}

/* PRODUCT CARD */

.product{
margin-top:20px;
padding:15px;
border-radius:20px;
background:linear-gradient(90deg,#7f5af0,#00c16e);
color:white;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.product img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
background:white;
}

.info{
flex:1;
}

.stockLow{
color:#ffdddd;
font-weight:bold;
}

/* BUTTONS */

.actions button{
margin-right:5px;
padding:6px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.delete{
background:red;
color:white;
}

.edit{
background:#ffc107;
}

/* ADD PAGE */

.addPage{
display:none;
margin-top:20px;
background:white;
padding:15px;
border-radius:15px;
}

.addPage input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#f2f2f2;
}

.saveBtn{
background:#f7b955;
padding:12px;
border:none;
width:100%;
border-radius:10px;
font-size:16px;
}

.preview{
width:100%;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="top">

<h2>Products List</h2>

<div class="addBtn" onclick="openAdd()">+ Add Product</div>

</div>


<div class="searchBox">

<input type="text" id="search" placeholder="Search Name / Code" onkeyup="searchProduct()">

</div>


<div id="productList"></div>


<!-- ADD PRODUCT -->

<div class="addPage" id="addPage">

<h2>Add / Edit Product</h2>

<input type="file" id="image" onchange="previewImage()">

<img id="preview" class="preview">

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="code" placeholder="Product Code">

<input type="number" id="stock" placeholder="Stock">

<input type="number" id="price" placeholder="Selling Price">

<button class="saveBtn" onclick="saveProduct()">Save Product</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { getStorage,ref,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";


const firebaseConfig={

apiKey:"AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",

authDomain:"mywebapp-93636.firebaseapp.com",

projectId:"mywebapp-93636",

storageBucket:"mywebapp-93636.firebasestorage.app",

messagingSenderId:"644012557966",

appId:"1:644012557966:web:aee6cc2a2621c41cf7ebdf"

};


const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

const storage=getStorage(app);

let userId="";
let editId=null;


onAuthStateChanged(auth,(user)=>{

if(user){

userId=user.uid;

loadProducts();

}else{

window.location="login.html";

}

});


window.openAdd=function(){

document.getElementById("addPage").style.display="block";

window.scrollTo({top:0,behavior:"smooth"})

}


/* IMAGE PREVIEW */

window.previewImage=function(){

const file=document.getElementById("image").files[0];

if(file){

document.getElementById("preview").src=URL.createObjectURL(file);

}

}


/* SAVE PRODUCT */

window.saveProduct=async function(){

const name=document.getElementById("name").value;

const code=document.getElementById("code").value;

const stock=document.getElementById("stock").value;

const price=document.getElementById("price").value;

const file=document.getElementById("image").files[0];


if(!name||!stock||!price){

alert("Fill all fields");

return;

}

let imageUrl="";

if(file){

const storageRef=ref(storage,"products/"+Date.now()+file.name);

await uploadBytes(storageRef,file);

imageUrl=await getDownloadURL(storageRef);

}


if(editId){

await updateDoc(doc(db,"users",userId,"products",editId),{

name,code,stock,price

});

alert("Product Updated");

editId=null;

}else{

await addDoc(collection(db,"users",userId,"products"),{

name,code,stock,price,image:imageUrl

});

alert("Product Added");

}

clearForm();

loadProducts();

}


/* LOAD PRODUCTS */

async function loadProducts(){

const list=document.getElementById("productList");

list.innerHTML="";

const querySnapshot=await getDocs(collection(db,"users",userId,"products"));

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();

const lowStock=data.stock<=5?"stockLow":"";

list.innerHTML+=`

<div class="product">

<img src="${data.image||'https://via.placeholder.com/80'}">

<div class="info">

<b>${data.name}</b>

<br>

Code: ${data.code||"-"}

<br>

<span class="${lowStock}">Stock: ${data.stock}</span>

<br>

Price: ${data.price}৳

</div>

<div class="actions">

<button class="edit" onclick="editProduct('${docSnap.id}','${data.name}','${data.code}','${data.stock}','${data.price}')">Edit</button>

<button class="delete" onclick="deleteProduct('${docSnap.id}')">Delete</button>

</div>

</div>

`;

});

}


/* DELETE */

window.deleteProduct=async function(id){

if(confirm("Delete Product?")){

await deleteDoc(doc(db,"users",userId,"products",id));

loadProducts();

}

}
