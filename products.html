<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product App</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#cfe9d1,#a8d5a2);
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:20px;
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#4ca1af,#2c3e50);
color:#ffbf5e;
}

/* SEARCH */
.search{
margin:15px;
background:#7ed37e;
padding:15px;
border-radius:40px;
display:flex;
gap:10px;
}

/* CATEGORY */
.catBox{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
}
.cat{
background:#7ed37e;
padding:8px 15px;
border-radius:20px;
}

/* CARD */
.card{
margin:15px;
padding:15px;
border-radius:20px;
display:flex;
gap:10px;
background:linear-gradient(90deg,#7b4cff,#00c37a);
}
.card img{
width:90px;
height:100px;
border-radius:10px;
}
.right{
margin-left:auto;
}

/* BUTTON */
.btn{
padding:6px 10px;
border:none;
border-radius:10px;
margin-top:5px;
}
.edit{background:#ffe58f;}
.delete{background:#ff8f8f;}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.form{
background:white;
padding:20px;
border-radius:15px;
width:90%;
}

/* INPUT */
.form input,select{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:20px;
background:#f5b55c;
}

/* CATEGORY LIST */
.catItem{
display:flex;
justify-content:space-between;
background:#f5b55c;
margin:5px 0;
padding:10px;
border-radius:20px;
}

.preview{
width:100px;
height:100px;
background:#ddd;
border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
<div>Products List</div>
<div onclick="openForm()">+ Add Products</div>
</div>

<div class="search">
🔍 <input id="search" placeholder="Search...">
</div>

<div class="catBox" id="catBox"></div>

<div id="list"></div>

<!-- FORM -->
<div class="modal" id="modal">
<div class="form">

<h2>Add Product</h2>

<img id="preview" class="preview">
<input type="file" id="imageFile">

<input id="name" placeholder="Name">
<select id="category"></select>

<input id="code" placeholder="Code">
<input id="stock" placeholder="Stock">

<input id="buy" placeholder="Buy">
<input id="sell" placeholder="Sell">
<input id="mrp" placeholder="MRP">

<h3>Category</h3>

<input id="newCat" placeholder="New Category">
<button onclick="addCategory()">Add</button>

<div id="catList"></div>

<button onclick="save()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products=[];
let categories=["All"];
let editId=null;

/* LOAD DATA */
async function load(){
products=[];
const querySnapshot = await getDocs(collection(db, "products"));
querySnapshot.forEach(docSnap=>{
products.push({id:docSnap.id,...docSnap.data()});
});
render(products);
}

/* RENDER */
function render(data){
list.innerHTML="";
data.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.image}">
<div>
<b>${p.name}</b><br>
MRP: ${p.mrp} | Sell: ${p.sell}
</div>

<div class="right">
Code: ${p.code}<br>
Category: ${p.category}<br>
Stock: ${p.stock}<br>

<button class="btn edit" onclick="edit('${p.id}')">Edit</button>
<button class="btn delete" onclick="del('${p.id}')">Delete</button>
</div>
</div>`;
});
}

/* SAVE */
window.save=async function(){

let data={
name:name.value,
code:code.value,
category:category.value,
stock:stock.value,
buy:buy.value,
sell:sell.value,
mrp:mrp.value,
image:preview.src
};

if(editId){
await updateDoc(doc(db,"products",editId),data);
}else{
await addDoc(collection(db,"products"),data);
}

closeForm();
load();
}

/* DELETE */
window.del=async function(id){
await deleteDoc(doc(db,"products",id));
load();
}

/* EDIT */
window.edit=function(id){
let p=products.find(x=>x.id==id);
editId=id;

name.value=p.name;
code.value=p.code;
category.value=p.category;
stock.value=p.stock;
buy.value=p.buy;
sell.value=p.sell;
mrp.value=p.mrp;
preview.src=p.image;

openForm();
}

/* CATEGORY */
function renderCategories(){
catBox.innerHTML="";
categories.forEach(c=>{
catBox.innerHTML+=`<div class="cat">${c}</div>`;
});

category.innerHTML="";
categories.forEach(c=>{
if(c!="All") category.innerHTML+=`<option>${c}</option>`;
});
}

/* ADD CATEGORY */
window.addCategory=function(){
let c=newCat.value;
if(c && !categories.includes(c)){
categories.push(c);
renderCategories();
}
}

/* IMAGE */
imageFile.onchange=function(){
let file=this.files[0];
let reader=new FileReader();
reader.onload=()=>preview.src=reader.result;
reader.readAsDataURL(file);
}

/* MODAL */
window.openForm=()=>modal.style.display="flex";
window.closeForm=()=>modal.style.display="none";

/* SEARCH */
search.oninput=function(){
let v=this.value.toLowerCase();
render(products.filter(p=>
p.name.toLowerCase().includes(v) ||
p.code.includes(v)
));
}

renderCategories();
load();

</script>

</body>
</html>
