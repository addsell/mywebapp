<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#6fb7d6,#9dd19d);
padding:15px;
}

/* TOP BAR */

.top{
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
font-weight:bold;
}

.addBtn{
color:#ffb74d;
font-weight:bold;
cursor:pointer;
font-size:20px;
}

/* SEARCH */

.searchBox{
margin-top:20px;
background:#7ed08d;
padding:15px;
border-radius:40px;
display:flex;
align-items:center;
gap:10px;
}

.searchBox input{
border:none;
background:none;
outline:none;
font-size:18px;
width:100%;
}

/* LIST GRID */

.viewBtns{
margin-top:15px;
display:flex;
gap:10px;
}

.viewBtns button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* PRODUCT CARD */

.product{
margin-top:20px;
display:flex;
gap:15px;
padding:15px;
border-radius:30px;
background:linear-gradient(90deg,#7f5af0,#00c16e);
color:black;
align-items:center;
}

/* IMAGE */

.product img{
width:90px;
height:120px;
background:white;
border-radius:10px;
object-fit:cover;
}

.tap{
font-size:12px;
font-weight:bold;
margin-top:5px;
}

/* LEFT */

.left{
width:120px;
text-align:center;
}

/* CENTER */

.center{
flex:1;
}

.name{
font-size:24px;
font-weight:bold;
}

/* RIGHT */

.right{
width:160px;
font-size:18px;
}

.actions{
margin-top:10px;
font-size:20px;
cursor:pointer;
}

.actions span{
margin-right:20px;
}

</style>
</head>

<body>

<!-- TOP -->

<div class="top">

<div>Products List</div>

<div class="addBtn" onclick="openAdd()">+ Add Products</div>

</div>


<!-- SEARCH -->

<div class="searchBox">

🔍 <input type="text" placeholder="Search Name/Code/Category">

</div>


<!-- LIST / GRID -->

<div class="viewBtns">

<button>List View</button>

<button>Grid View</button>

</div>


<!-- PRODUCT LIST -->

<div id="productList">


<div class="product">

<div class="left">

<img src="https://i.imgur.com/yXOvdOS.png">

<div class="tap">Tap to image full view</div>

</div>


<div class="center">

<div class="name">Vaccum Flask 1L</div>

<div>M.R.P: 120৳ &nbsp;&nbsp; Sell Rate: 100৳</div>

</div>


<div class="right">

<div>Code: 928552</div>

<div>Category: Flask</div>

<div>Stock: 52 Peace</div>

<div class="actions">

<span>Edit</span>

<span>Delete</span>

</div>

</div>

</div>



<div class="product">

<div class="left">

<img src="https://i.imgur.com/3ZQ3Z6K.png">

<div class="tap">Tap to image full view</div>

</div>


<div class="center">

<div class="name">mosquito killing bat</div>

<div>M.R.P: 500৳ &nbsp;&nbsp; Sell Rate: 450৳</div>

</div>


<div class="right">

<div>Code: 934512</div>

<div>Category: Electric</div>

<div>Stock: 570 Peace</div>

<div class="actions">

<span>Edit</span>

<span>Delete</span>

</div>

</div>

</div>


</div>



<script>

function openAdd(){

alert("Add product page");

}

</script>

</body>
</html>
