<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Products</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
margin:0;
background:#f1f3f6;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

.addBtn{
background:#28a745;
color:white;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:15px;
padding:15px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
}

.actions{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.edit{
background:#007bff;
color:white;
}

.delete{
background:red;
color:white;
}

.searchBox{
padding:10px;
}

.searchBox input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

/* popup image */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup img{
max-width:90%;
max-height:90%;
}

/* add modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
overflow:auto;
padding:20px;
}

.modal input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

.saveBtn{
background:#28a745;
color:white;
width:100%;
padding:12px;
}

</style>

</head>

<body>

<header>

<h2>Products</h2>

<button class="addBtn" onclick="openAdd()">Add Product</button>

</header>


<div class="searchBox">

<input type="text" placeholder="Search Product..." onkeyup="searchProduct(this.value)">

</div>


<div class="products" id="products"></div>


<!-- IMAGE POPUP -->

<div class="popup" id="popup" onclick="closePopup()">
<img id="popupImg">
</div>


<!-- ADD PRODUCT PAGE -->

<div class="modal" id="addModal">

<h2>Add Product</h2>

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="code" placeholder="Product Code">

<select id="category">
<option>General</option>
<option>Electronics</option>
<option>Clothing</option>
</select>

<input type="number" id="stock" placeholder="Total Stock">

<input type="number" id="purchase" placeholder="Purchase Price">

<input type="number" id="sell" placeholder="Sell Price">

<input type="number" id="mrp" placeholder="MRP">

<input type="text" id="image" placeholder="Image URL">

<button class="saveBtn" onclick="saveProduct()">Save Product</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";

import { 
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { 
getFirestore,
collection,
addDoc,
getDocs,
doc,
deleteDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",
measurementId: "G-BHD1Z4TD7G"

};

const app = initializeApp(firebaseConfig);

const analytics = getAnalytics(app);

const auth = getAuth();

const db = getFirestore();


let currentUser=null;


/* CHECK LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

currentUser=user;

loadProducts();

}

});


/* ADD PRODUCT */

window.saveProduct = async function(){

let name=document.getElementById("name").value;

let code=document.getElementById("code").value;

let category=document.getElementById("category").value;

let stock=document.getElementById("stock").value;

let purchase=document.getElementById("purchase").value;

let sell=document.getElementById("sell").value;

let mrp=document.getElementById("mrp").value;

let image=document.getElementById("image").value;


await addDoc(collection(db,"products"),{

uid:currentUser.uid,
name,
code,
category,
stock,
purchase,
sell,
mrp,
image

});

document.getElementById("addModal").style.display="none";

loadProducts();

}


/* LOAD PRODUCTS */

async function loadProducts(){

const snapshot = await getDocs(collection(db,"products"));

let html="";

snapshot.forEach((docu)=>{

let p=docu.data();

if(p.uid!==currentUser.uid) return;

html+=`

<div class="product">

<img src="${p.image}" onclick="showImage('${p.image}')">

<h3>${p.name}</h3>

<p>Stock : ${p.stock}</p>

<p>Sell : ${p.sell}</p>

<div class="actions">

<button class="edit">Edit</button>

<button class="delete" onclick="deleteProduct('${docu.id}')">Delete</button>

</div>

</div>

`;

});

document.getElementById("products").innerHTML=html;

}


/* DELETE */

window.deleteProduct=async(id)=>{

await deleteDoc(doc(db,"products",id));

loadProducts();

}


/* IMAGE POPUP */

window.showImage=(src)=>{

document.getElementById("popup").style.display="flex";

document.getElementById("popupImg").src=src;

}

window.closePopup=()=>{

document.getElementById("popup").style.display="none";

}


/* SEARCH */

window.searchProduct=(txt)=>{

let items=document.querySelectorAll(".product");

items.forEach(p=>{

let name=p.innerText.toLowerCase();

p.style.display=name.includes(txt.toLowerCase())?"block":"none";

});

}


/* OPEN ADD */

window.openAdd=()=>{

document.getElementById("addModal").style.display="block";

}

</script>

</body>
</html>
