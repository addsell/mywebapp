<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#9fd3a7,#cde7d1);
padding:15px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
font-size:28px;
font-weight:bold;
}

.addBtn{
color:#f7b955;
font-size:22px;
cursor:pointer;
}

/* SEARCH */

.searchBox{
background:#7ed08d;
padding:15px;
border-radius:40px;
display:flex;
align-items:center;
margin:15px 0;
}

.searchBox input{
border:none;
background:none;
font-size:18px;
outline:none;
width:100%;
}

/* VIEW BUTTON */

.viewBtns{
margin-bottom:10px;
}

.viewBtns button{
padding:10px 15px;
border:none;
border-radius:10px;
margin-right:5px;
cursor:pointer;
}

/* PRODUCT LIST */

.product{
display:flex;
gap:15px;
padding:15px;
border-radius:25px;
margin-bottom:15px;
background:linear-gradient(90deg,#7f5af0,#00c16e);
color:white;
align-items:center;
}

.product img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
background:white;
cursor:pointer;
}

.info{
flex:1;
}

.actions button{
border:none;
padding:6px 12px;
border-radius:8px;
margin-right:5px;
cursor:pointer;
}

.delete{
background:red;
color:white;
}

.edit{
background:#ffc107;
}

/* GRID VIEW */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.grid .product{
flex-direction:column;
text-align:center;
}

/* IMAGE VIEW */

#imgViewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

#imgViewer img{
max-width:90%;
max-height:90%;
}

/* ADD PAGE */

#addPage{
display:none;
margin-top:20px;
}

input,select{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:20px;
}

.saveBtn{
background:#f7b955;
padding:15px;
border:none;
border-radius:30px;
width:150px;
font-size:18px;
cursor:pointer;
}

.lowStock{
color:yellow;
font-weight:bold;
}

</style>

</head>

<body>


<div id="listPage">

<div class="header">

Products List

<div class="addBtn" onclick="openAdd()">+ Add Products</div>

</div>


<div class="searchBox">

🔍 <input type="text" id="search" placeholder="Search Name/Code/Category" onkeyup="searchProduct()">

</div>


<div class="viewBtns">

<button onclick="listView()">List</button>

<button onclick="gridView()">Grid</button>

</div>


<div id="productList"></div>

</div>


<!-- ADD PAGE -->

<div id="addPage">

<h2>Add Product</h2>

<input type="file" id="image">

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="code" placeholder="Product Code">

<input type="text" id="category" placeholder="Category">

<input type="number" id="stock" placeholder="Stock">

<input type="number" id="purchase" placeholder="Purchase Price">

<input type="number" id="price" placeholder="Selling Price">

<input type="number" id="mrp" placeholder="MRP">

<button class="saveBtn" onclick="saveProduct()">Save</button>

</div>


<!-- IMAGE VIEW -->

<div id="imgViewer" onclick="closeImg()">

<img id="bigImg">

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import {

getStorage,
ref,
uploadBytes,
getDownloadURL

}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";


const firebaseConfig={

apiKey:"AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",

authDomain:"mywebapp-93636.firebaseapp.com",

projectId:"mywebapp-93636",

storageBucket:"mywebapp-93636.firebasestorage.app",

messagingSenderId:"644012557966",

appId:"1:644012557966:web:aee6cc2a2621c41cf7ebdf"

};


const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);

const storage=getStorage(app);


let userId="";


onAuthStateChanged(auth,(user)=>{

if(user){

userId=user.uid;

loadProducts();

}else{

location="login.html";

}

});


window.openAdd=function(){

document.getElementById("listPage").style.display="none";

document.getElementById("addPage").style.display="block";

}


window.saveProduct=async function(){

let name=name.value;

let code=code.value;

let category=category.value;

let stock=stock.value;

let purchase=purchase.value;

let price=price.value;

let mrp=mrp.value;

let file=image.files[0];


let img="";

if(file){

let storageRef=ref(storage,"products/"+Date.now()+file.name);

await uploadBytes(storageRef,file);

img=await getDownloadURL(storageRef);

}


await addDoc(collection(db,"users",userId,"products"),{

name,

code,

category,

stock,

purchase,

price,

mrp,

image:img

});


alert("Product Added");

location.reload();

}


async function loadProducts(){

let list=document.getElementById("productList");

list.innerHTML="";

let query=await getDocs(collection(db,"users",userId,"products"));

query.forEach((docSnap)=>{

let d=docSnap.data();

let stockWarn=d.stock<5?`<span class="lowStock">Low Stock</span>`:"";


list.innerHTML+=`

<div class="product">

<img src="${d.image}" onclick="viewImg('${d.image}')">

<div class="info">

<b>${d.name}</b><br>

Code: ${d.code}<br>

Category: ${d.category}<br>

Stock: ${d.stock} ${stockWarn}<br>

Sell: ${d.price}৳ | MRP: ${d.mrp}৳

</div>

<div class="actions">

<button class="delete" onclick="deleteProduct('${docSnap.id}')">Delete</button>

</div>

</div>

`;

});

}


window.deleteProduct=async function(id){

await deleteDoc(doc(db,"users",userId,"products",id));

loadProducts();

}


window.searchProduct=function(){

let input=search.value.toLowerCase();

let products=document.getElementsByClassName("product");


for(let i=0;i<products.length;i++){

let text=products[i].innerText.toLowerCase();

products[i].style.display=text.includes(input)?"flex":"none";

}

}


window.viewImg=function(src){

imgViewer.style.display="flex";

bigImg.src=src;

}


window.closeImg=function(){

imgViewer.style.display="none";

}


window.gridView=function(){

productList.classList.add("grid");

}


window.listView=function(){

productList.classList.remove("grid");

}

</script>

</body>
</html>
