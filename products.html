<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Products</title>

<style>

body{
font-family:Arial;
background:#e7f2e7;
margin:0;
}

.top{
background:#2c6c8c;
padding:15px;
color:white;
display:flex;
gap:20px;
}

.top button{
padding:8px 15px;
border:none;
cursor:pointer;
}

.container{
padding:20px;
}

input,select{
padding:10px;
margin:5px;
width:90%;
}

.product{
background:white;
margin-top:10px;
padding:10px;
border-radius:6px;
display:flex;
gap:10px;
align-items:center;
}

.product img{
width:60px;
height:60px;
object-fit:cover;
}

</style>

</head>

<body>

<div class="top">

<button onclick="showProducts()">Products List</button>

<button onclick="lowStock()">Low Stock</button>

<button onclick="showCategory()">Add Category</button>

<button onclick="showAddProduct()">Add Product</button>

</div>


<div class="container">

<input id="search" placeholder="Search Product">

<div id="list"></div>

<div id="form"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";



const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);



let categories=[];



// Load Categories

async function loadCategory(){

const snap = await getDocs(collection(db,"category"));

categories=[];

snap.forEach(d=>{

categories.push(d.data().name)

})

}

loadCategory();



// Show Products

window.showProducts = async function(){

document.getElementById("form").innerHTML="";

const list=document.getElementById("list");

list.innerHTML="Loading...";

const snap=await getDocs(collection(db,"products"));

list.innerHTML="";

snap.forEach(docSnap=>{

let p=docSnap.data();

list.innerHTML+=`

<div class="product">

<img src="${p.image}">

<div>

<b>${p.name}</b>

<br>

Code: ${p.code}

<br>

Stock: ${p.stock}

<br>

<button onclick="deleteProduct('${docSnap.id}')">Delete</button>

</div>

</div>

`;

})

}



// Low Stock

window.lowStock = async function(){

const list=document.getElementById("list");

list.innerHTML="Loading...";

const snap=await getDocs(collection(db,"products"));

list.innerHTML="";

snap.forEach(docSnap=>{

let p=docSnap.data();

if(p.stock<=p.low){

list.innerHTML+=`

<div class="product">

<img src="${p.image}">

<div>

<b>${p.name}</b>

<br>

Stock: ${p.stock}

</div>

</div>

`;

}

})

}



// Add Category

window.showCategory = function(){

document.getElementById("form").innerHTML=`

<h2>Add Category</h2>

<input id="cat" placeholder="Category Name">

<button onclick="saveCategory()">Save</button>

`;

}



window.saveCategory = async function(){

let name=document.getElementById("cat").value;

await addDoc(collection(db,"category"),{

name:name

});

alert("Category Added");

loadCategory();

}



// Add Product

window.showAddProduct = function(){

let options="";

categories.forEach(c=>{

options+=`<option>${c}</option>`

})

document.getElementById("form").innerHTML=`

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">

<input id="code" placeholder="Product Code">

<select id="cat">

${options}

</select>

<input id="stock" placeholder="Total Stock">

<input id="purchase" placeholder="Purchase Price">

<input id="sell" placeholder="Selling Price">

<input id="mrp" placeholder="MRP">

<input id="low" placeholder="Low Stock Alert">

<input type="file" id="img">

<button onclick="saveProduct()">Save</button>

`;

}



// Save Product

window.saveProduct = async function(){

let name=name.value;

let code=document.getElementById("code").value;

let cat=document.getElementById("cat").value;

let stock=document.getElementById("stock").value;

let purchase=document.getElementById("purchase").value;

let sell=document.getElementById("sell").value;

let mrp=document.getElementById("mrp").value;

let low=document.getElementById("low").value;

let file=document.getElementById("img").files[0];

const storageRef=ref(storage,"products/"+file.name);

await uploadBytes(storageRef,file);

const url=await getDownloadURL(storageRef);


await addDoc(collection(db,"products"),{

name:name,

code:code,

category:cat,

stock:Number(stock),

purchase:purchase,

sell:sell,

mrp:mrp,

low:Number(low),

image:url

});

alert("Product Added");

showProducts();

}



// Delete Product

window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

showProducts();

}



// Search

document.getElementById("search").addEventListener("keyup",function(){

let v=this.value.toLowerCase();

let items=document.querySelectorAll(".product");

items.forEach(p=>{

if(p.innerText.toLowerCase().includes(v)){

p.style.display="flex";

}else{

p.style.display="none";

}

})

})


showProducts();

</script>

</body>

</html>
