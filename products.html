<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<style>

body{

margin:0;

font-family:Arial;

background:linear-gradient(#6fb7d6,#a6d9a6);

padding:15px;

}

/* HEADER */

.top{

display:flex;

justify-content:space-between;

align-items:center;

font-size:24px;

font-weight:bold;

}

.addBtn{

color:#ffb74d;

cursor:pointer;

}

/* SEARCH */

.searchBox{

margin-top:20px;

background:#7ed08d;

padding:15px;

border-radius:40px;

display:flex;

align-items:center;

gap:10px;

}

.searchBox input{

border:none;

background:none;

outline:none;

font-size:18px;

width:100%;

}

/* PRODUCT */

.product{

margin-top:20px;

padding:15px;

border-radius:30px;

background:linear-gradient(90deg,#7f5af0,#00c16e);

display:flex;

gap:15px;

align-items:center;

}

.product img{

width:90px;

height:120px;

border-radius:10px;

background:white;

object-fit:cover;

}

.left{

text-align:center;

width:120px;

}

.tap{

font-size:12px;

font-weight:bold;

}

.center{

flex:1;

}

.name{

font-size:24px;

font-weight:bold;

}

.right{

width:180px;

font-size:18px;

}

.actions span{

margin-right:15px;

cursor:pointer;

font-weight:bold;

}

/* ADD PAGE */

.addPage{

display:none;

margin-top:20px;

}

.addPage input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:10px;

}

.saveBtn{

padding:12px;

background:#ffb74d;

border:none;

width:100%;

font-size:18px;

border-radius:10px;

}

</style>

</head>



<body>



<div class="top">

<div>Products List</div>

<div class="addBtn" onclick="showAdd()">+ Add Products</div>

</div>



<div class="searchBox">

🔍 <input type="text" id="search" placeholder="Search Name/Code/Category" onkeyup="searchProduct()">

</div>



<div id="productList"></div>



<!-- ADD PAGE -->

<div class="addPage" id="addPage">

<h2>Add Products</h2>

<input type="file" id="image">

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="code" placeholder="Product Code">

<input type="text" id="category" placeholder="Category">

<input type="number" id="stock" placeholder="Stock">

<input type="number" id="mrp" placeholder="MRP">

<input type="number" id="price" placeholder="Selling Price">

<button class="saveBtn" onclick="addProduct()">Save</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { getStorage,ref,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";



const firebaseConfig = {

apiKey: "YOUR KEY",

authDomain: "YOUR DOMAIN",

projectId: "YOUR PROJECT",

storageBucket: "YOUR BUCKET",

messagingSenderId: "ID",

appId: "APP ID"

};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const storage = getStorage(app);



let userId="";



onAuthStateChanged(auth,(user)=>{

if(user){

userId=user.uid;

loadProducts();

}else{

window.location="login.html";

}

});



window.showAdd=function(){

document.getElementById("addPage").style.display="block";

}



window.addProduct = async function(){

const name=document.getElementById("name").value;

const code=document.getElementById("code").value;

const category=document.getElementById("category").value;

const stock=document.getElementById("stock").value;

const mrp=document.getElementById("mrp").value;

const price=document.getElementById("price").value;

const file=document.getElementById("image").files[0];



let imageUrl="";



if(file){

const storageRef=ref(storage,"products/"+Date.now()+file.name);

await uploadBytes(storageRef,file);

imageUrl=await getDownloadURL(storageRef);

}



await addDoc(collection(db,"users",userId,"products"),{

name,code,category,stock,mrp,price,image:imageUrl

});



alert("Product Added");

loadProducts();

}



async function loadProducts(){

const list=document.getElementById("productList");

list.innerHTML="";



const querySnapshot=await getDocs(collection(db,"users",userId,"products"));



querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();



list.innerHTML+=`

<div class="product">

<div class="left">

<img src="${data.image}">

<div class="tap">Tap to image full view</div>

</div>



<div class="center">

<div class="name">${data.name}</div>

<div>M.R.P: ${data.mrp}৳ Sell Rate: ${data.price}৳</div>

</div>



<div class="right">

<div>Code: ${data.code}</div>

<div>Category: ${data.category}</div>

<div>Stock: ${data.stock}</div>

<div class="actions">

<span onclick="deleteProduct('${docSnap.id}')">Delete</span>

</div>

</div>

</div>

`;



});

}



window.deleteProduct = async function(id){

await deleteDoc(doc(db,"users",userId,"products",id));

loadProducts();

}



window.searchProduct=function(){

const input=document.getElementById("search").value.toLowerCase();

const products=document.getElementsByClassName("product");



for(let i=0;i<products.length;i++){

let text=products[i].innerText.toLowerCase();

products[i].style.display=text.includes(input)?"flex":"none";

}

}

</script>



</body>

</html>
