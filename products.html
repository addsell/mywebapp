<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product List</title>

<style>

body{
font-family: Arial;
background:#f4f6fb;
margin:0;
}

/* HEADER */

.header{
background:#4c5bd4;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header h2{
margin:0;
}

/* SEARCH */

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

/* LOW STOCK */

.low-stock{
background:#ffe3b3;
padding:10px;
margin:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
}

/* CATEGORY */

.category{
display:flex;
overflow:auto;
padding:10px;
gap:10px;
}

.category button{
padding:8px 15px;
border:none;
border-radius:8px;
background:#eee;
}

/* PRODUCT CARD */

.products{
padding:10px;
}

.card{
display:flex;
background:white;
border-radius:12px;
padding:10px;
margin-bottom:10px;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:60px;
height:60px;
border-radius:8px;
object-fit:cover;
margin-right:10px;
}

.card h4{
margin:0;
}

.price{
color:red;
font-weight:bold;
}

.stock{
color:green;
}

/* MENU */

.menu{
margin-left:auto;
cursor:pointer;
font-size:20px;
}

/* FLOAT BUTTON */

.add-btn{
position:fixed;
bottom:20px;
right:20px;
background:#4c5bd4;
color:white;
padding:15px 20px;
border-radius:30px;
font-size:16px;
border:none;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="header">
<h2>Product List</h2>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search by name or code">
</div>

<div class="low-stock">
<span>⚠ Low Stock Products</span>
<button onclick="showLowStock()">View</button>
</div>

<div class="category">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('Electric')">Electric</button>
<button onclick="filterCategory('Flask')">Flask</button>
<button onclick="filterCategory('Bottle')">Bottle</button>
</div>

<div class="products" id="productList"></div>

<button class="add-btn" onclick="location.href='addproduct.html'">
+ Add Product
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore,collection,addDoc,getDocs,deleteDoc,doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",
measurementId: "G-BHD1Z4TD7G"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products=[];

/* LOAD PRODUCTS */

async function loadProducts(){

const querySnapshot = await getDocs(collection(db,"products"));

products=[];

querySnapshot.forEach((docu)=>{
products.push({
id:docu.id,
...docu.data()
});
});

displayProducts(products);

}

loadProducts();

/* DISPLAY */

function displayProducts(list){

let html="";

list.forEach(p=>{

html+=`

<div class="card">

<img src="${p.image}">

<div>

<h4>${p.name}</h4>

Code: ${p.code}<br>

<span class="price">Sale: ${p.sell}৳</span><br>

Purchase: ${p.purchase}৳<br>

<span class="stock">Stock: ${p.stock}</span>

</div>

<div class="menu" onclick="deleteProduct('${p.id}')">
⋮
</div>

</div>

`;

});

document.getElementById("productList").innerHTML=html;

}

/* SEARCH */

document.getElementById("search").addEventListener("input",(e)=>{

let value=e.target.value.toLowerCase();

let filtered=products.filter(p=>

p.name.toLowerCase().includes(value) ||

p.code.includes(value)

);

displayProducts(filtered);

});

/* CATEGORY */

function filterCategory(cat){

if(cat=="all"){

displayProducts(products);

return;

}

let filtered=products.filter(p=>p.category==cat);

displayProducts(filtered);

}

/* LOW STOCK */

function showLowStock(){

let filtered=products.filter(p=>p.stock<=5);

displayProducts(filtered);

}

/* DELETE */

async function deleteProduct(id){

if(confirm("Delete product?")){

await deleteDoc(doc(db,"products",id));

loadProducts();

}

}

window.deleteProduct=deleteProduct;
window.filterCategory=filterCategory;
window.showLowStock=showLowStock;

</script>

</body>
</html>
