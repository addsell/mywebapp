<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product App</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#cfe9d1,#a8d5a2);
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:20px;
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#4ca1af,#2c3e50);
color:#ffbf5e;
}

/* SEARCH */
.search{
margin:15px;
background:#7ed37e;
padding:15px;
border-radius:40px;
display:flex;
align-items:center;
}
.search input{
border:none;
outline:none;
background:none;
width:100%;
font-size:16px;
}

/* CATEGORY */
.catBox{
display:flex;
gap:10px;
padding:0 15px;
overflow:auto;
}
.cat{
background:#7ed37e;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

/* CARD */
.card{
margin:15px;
padding:15px;
border-radius:20px;
display:flex;
gap:10px;
background:linear-gradient(90deg,#7b4cff,#00c37a);
}
.card img{
width:90px;
height:110px;
border-radius:10px;
object-fit:cover;
}
.info{flex:1;}
.right{min-width:140px;}

.btn{
border:none;
padding:6px 12px;
margin-top:5px;
border-radius:10px;
cursor:pointer;
}
.edit{background:#ffe58f;}
.delete{background:#ff8f8f;}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.form{
background:white;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

/* INPUT */
.form input,select{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:20px;
background:#f5b55c;
}

.preview{
width:100px;
height:100px;
background:#eee;
border-radius:10px;
object-fit:cover;
}

#imgView{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
}
#imgView img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<div class="header">
<div>Products List</div>
<div onclick="openForm()">+ Add Products</div>
</div>

<div class="search">
🔍 <input id="search" placeholder="Search Name/Code/Category">
</div>

<div class="catBox" id="catBox"></div>

<div id="list"></div>

<!-- FORM -->
<div class="modal" id="modal">
<div class="form">

<h2>Add Product</h2>

<img id="preview" class="preview">

<input type="file" id="imageFile">

<input id="name" placeholder="Product Name">
<select id="category"></select>

<input id="code" placeholder="Product Code">
<input id="stock" placeholder="Stock">

<input id="buy" placeholder="Purchase Price">
<input id="sell" placeholder="Selling Price">

<input id="newCat" placeholder="New Category">
<button onclick="addCategory()">Add Category</button>

<button onclick="save()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>
</div>

<!-- IMAGE VIEW -->
<div id="imgView" onclick="this.style.display='none'">
<img id="fullImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.appspot.com",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* DATA */
let products=[];
let categories=[];
let editId=null;

/* LOAD DATA */
async function load(){
const snap = await getDocs(collection(db,"products"));
products=[];
snap.forEach(d=>products.push({id:d.id,...d.data()}));

categories=[...new Set(products.map(p=>p.category))];

renderCategories();
render(products);
}

/* CATEGORY */
function renderCategories(){
catBox.innerHTML="";

catBox.innerHTML+=`<div class="cat" onclick="filterCat('all')">All</div>`;

categories.forEach(c=>{
catBox.innerHTML+=`<div class="cat" onclick="filterCat('${c}')">${c}</div>`;
});

category.innerHTML="";
categories.forEach(c=>{
category.innerHTML+=`<option>${c}</option>`;
});
}

/* FILTER */
window.filterCat=(c)=>{
if(c=="all") render(products);
else render(products.filter(p=>p.category==c));
}

/* RENDER */
function render(data){
list.innerHTML="";

data.forEach(p=>{
list.innerHTML+=`
<div class="card">

<img src="${p.image||''}" onclick="viewImg('${p.image||''}')">

<div class="info">
<b>${p.name}</b><br>
Sell: ${p.sell}
</div>

<div class="right">
Code: ${p.code}<br>
Category: ${p.category}<br>
Stock: ${p.stock}<br>

<button class="btn edit" onclick="edit('${p.id}')">Edit</button>
<button class="btn delete" onclick="del('${p.id}')">Delete</button>
</div>

</div>`;
});
}

/* IMAGE */
function toBase64(file){
return new Promise(res=>{
const r=new FileReader();
r.onload=()=>res(r.result);
r.readAsDataURL(file);
});
}

/* SAVE */
window.save=async()=>{
let data={
name:name.value,
code:code.value,
category:category.value,
stock:stock.value,
buy:Number(buy.value),
sell:Number(sell.value),
profit:Number(sell.value)-Number(buy.value)
};

const file=imageFile.files[0];
if(file){
data.image=await toBase64(file);
}

if(editId){
await updateDoc(doc(db,"products",editId),data);
}else{
await addDoc(collection(db,"products"),data);
}

closeForm();
load();
}

/* EDIT */
window.edit=(id)=>{
let p=products.find(x=>x.id==id);
editId=id;

name.value=p.name;
code.value=p.code;
category.value=p.category;
stock.value=p.stock;
buy.value=p.buy;
sell.value=p.sell;
preview.src=p.image;

openForm();
}

/* DELETE */
window.del=async(id)=>{
await deleteDoc(doc(db,"products",id));
load();
}

/* SEARCH */
search.oninput=function(){
let v=this.value.toLowerCase();

render(products.filter(p=>
p.name.toLowerCase().includes(v) ||
p.code.includes(v) ||
p.category.toLowerCase().includes(v)
));
}

/* MODAL */
window.openForm=()=>modal.style.display="flex";
window.closeForm=()=>modal.style.display="none";

/* IMAGE VIEW */
window.viewImg=(src)=>{
fullImg.src=src;
imgView.style.display="flex";
}

/* INIT */
load();

</script>

</body>
</html>
