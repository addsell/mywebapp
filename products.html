<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{
font-family:Arial;
margin:0;
background:linear-gradient(#dff3dc,#9dd39d);
}

.header{
display:flex;
justify-content:space-between;
padding:15px;
background:linear-gradient(90deg,#2c7ecb,#2a9df4);
color:#ffcc66;
font-size:22px;
font-weight:bold;
}

.search{
margin:10px;
background:#7bd389;
padding:12px;
border-radius:40px;
}
.search input{
width:100%;
border:none;
background:none;
font-size:16px;
outline:none;
}

.cat-bar{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
}
.cat{
background:#7bd389;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
}

.card{
margin:10px;
padding:12px;
border-radius:20px;
background:linear-gradient(90deg,#7b4ce2,#00a86b);
display:flex;
gap:10px;
}
.card img{
width:70px;height:70px;
border-radius:10px;
}
.info{flex:1;}
.right{text-align:right}

.btn{
padding:6px 10px;
border:none;
border-radius:10px;
margin-top:5px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.form{
background:#fff;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}
.form input,.form select{
width:100%;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<div class="header">
<div>Products List</div>
<div onclick="openForm()">+ Add Products</div>
</div>

<div class="search">
<input id="search" placeholder="Search Name/Code/Category">
</div>

<div class="cat-bar" id="cats"></div>
<div id="list"></div>

<!-- PRODUCT MODAL -->
<div class="modal" id="modal">
<div class="form">

<h3>Add Product</h3>

<input type="file" id="image">
<input id="name" placeholder="Product Name">
<input id="code" placeholder="Product Code">

<select id="category"></select>

<input id="stock" placeholder="Stock">
<input id="buy" placeholder="Buy Price">
<input id="sell" placeholder="Sell Price">
<input id="mrp" placeholder="MRP">

<button onclick="save()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
query, where, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import { getAuth, signInAnonymously, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

/* 🔥 CONFIG */
const firebaseConfig = {
apiKey:"AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain:"mywebapp-93636.firebaseapp.com",
projectId:"mywebapp-93636"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let products=[];

/* 🔐 AUTO LOGIN FIX */
signInAnonymously(auth);

/* AUTH */
onAuthStateChanged(auth,(u)=>{
if(!u) return;
user=u;
loadProducts();
loadCategory();
});

/* LOAD PRODUCTS */
function loadProducts(){
onSnapshot(query(collection(db,"products"), where("uid","==",user.uid)),snap=>{
products=[];
snap.forEach(d=>{
let p=d.data();
p.id=d.id;
products.push(p);
});
render(products);
});
}

/* LOAD CATEGORY */
function loadCategory(){
onSnapshot(query(collection(db,"categories"), where("uid","==",user.uid)),snap=>{
category.innerHTML="";
cats.innerHTML="<div class='cat' onclick='filterCat(\"All\")'>All</div>";

snap.forEach(d=>{
let c=d.data();
category.innerHTML+=`<option>${c.name}</option>`;
cats.innerHTML+=`<div class="cat" onclick='filterCat("${c.name}")'>${c.name}</div>`;
});
});
}

/* RENDER */
function render(data){
list.innerHTML="";
data.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img || 'https://via.placeholder.com/70'}">
<div class="info">
<b>${p.name}</b><br>
MRP: ${p.mrp} | Sell: ${p.sell}<br>
Code: ${p.code}<br>
${p.category}
</div>
<div class="right">
Stock: ${p.stock}<br>
<button class="btn" onclick="del('${p.id}')">Delete</button>
</div>
</div>`;
});
}

/* SEARCH */
search.oninput=function(){
let v=this.value.toLowerCase();
render(products.filter(p=>
(p.name||"").toLowerCase().includes(v) ||
(p.code||"").includes(v) ||
(p.category||"").toLowerCase().includes(v)
));
};

/* FILTER */
window.filterCat=(c)=>{
if(c=="All") render(products);
else render(products.filter(p=>p.category==c));
};

/* MODAL */
window.openForm=()=>modal.style.display="flex";
window.closeForm=()=>modal.style.display="none";

/* DELETE */
window.del=async(id)=>{
await deleteDoc(doc(db,"products",id));
};

/* ✅ FIXED SAVE FUNCTION */
window.save=async()=>{

if(!name.value.trim()) return alert("Name required");
if(!category.value) return alert("Select category");

let img="";

/* 🔥 IMAGE FIX */
if(image.files.length>0){
img = await new Promise((resolve)=>{
let reader=new FileReader();
reader.onload=e=>resolve(e.target.result);
reader.readAsDataURL(image.files[0]);
});
}

/* 🔥 SAVE GUARANTEED */
await addDoc(collection(db,"products"),{
name:name.value.trim(),
code:code.value.trim(),
category:category.value,
stock:Number(stock.value||0),
buy:Number(buy.value||0),
sell:Number(sell.value||0),
mrp:Number(mrp.value||0),
img:img,
uid:user.uid
});

alert("Product Added ✅");

/* CLEAR */
name.value="";
code.value="";
stock.value="";
buy.value="";
sell.value="";
mrp.value="";
image.value="";

closeForm();
};

</script>
</body>
</html>
