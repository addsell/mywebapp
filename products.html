<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>

<style>
body{
margin:0;
font-family:Arial;
background:#cfe3c8;
padding:10px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
background:linear-gradient(90deg,#2c9ac7,#1e5f9a);
color:#ffbf5e;
padding:15px;
border-radius:12px;
font-size:22px;
font-weight:bold;
}

/* SEARCH */
.search{
margin:12px 0;
display:flex;
align-items:center;
background:#7ccf7c;
padding:10px;
border-radius:40px;
}

.search input{
border:none;
outline:none;
width:100%;
background:transparent;
font-size:16px;
}

/* CARD */
.card{
display:flex;
gap:10px;
background:linear-gradient(90deg,#7b4cff,#00c37a);
padding:15px;
margin:10px 0;
border-radius:20px;
color:black;
}

/* IMAGE */
.card img{
width:90px;
height:110px;
border-radius:10px;
object-fit:cover;
cursor:pointer;
}

/* INFO */
.info{
flex:1;
}

.right{
min-width:140px;
}

.btn{
border:none;
padding:6px 10px;
margin-top:5px;
cursor:pointer;
border-radius:8px;
}

.edit{background:#fff2a6;}
.delete{background:#ffb3b3;}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.form{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

.form input,select{
width:100%;
padding:10px;
margin:5px 0;
}

/* IMAGE VIEW */
#imgView{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
}

#imgView img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<div class="header">
<div>Products List</div>
<div onclick="openForm()">+ Add Products</div>
</div>

<div class="search">
<input id="searchInput" placeholder="Search Name/Code/Category">
</div>

<div id="list"></div>

<!-- FORM -->
<div class="modal" id="modal">
<div class="form">

<h3>Add Product</h3>

<input id="name" placeholder="Name">
<input id="code" placeholder="Code">

<input id="category" placeholder="Category">

<input id="buy" type="number" placeholder="Buy Price">
<input id="sell" type="number" placeholder="Sell Price">
<input id="stock" type="number" placeholder="Stock">

<input type="file" id="imageFile">

<button onclick="save()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>
</div>

<!-- IMAGE FULL VIEW -->
<div id="imgView" onclick="this.style.display='none'">
<img id="fullImg">
</div>

<script type="module">

import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* Firebase */
const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636"
};

const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user=null;
let products=[];
let editId=null;
let initialized=false;

/* AUTH */
onAuthStateChanged(auth,(u)=>{
if(!u){
location.replace("login.html");
return;
}
if(initialized) return;
initialized=true;

user=u;

/* BACK BUTTON FIX */
history.pushState(null,null,location.href);
window.onpopstate=function(){
location.replace("dashboard.html");
};

load();
});

/* LOAD */
async function load(){

const snap=await getDocs(query(collection(db,"products"),where("uid","==",user.uid)));

products=[];
snap.forEach(d=>products.push({id:d.id,...d.data()}));

render(products);
}

/* RENDER */
function render(data){

list.innerHTML="";

data.forEach(p=>{

list.innerHTML+=`
<div class="card">

<img src="${p.image||''}" onclick="viewImg('${p.image||''}')">

<div class="info">
<b>${p.name}</b><br>
M.R.P: ${p.buy} | Sell: ${p.sell}
</div>

<div class="right">
Code: ${p.code}<br>
Category: ${p.category}<br>
Stock: ${p.stock}<br>

<button class="btn edit" onclick="edit('${p.id}')">Edit</button>
<button class="btn delete" onclick="del('${p.id}')">Delete</button>
</div>

</div>
`;
});
}

/* SEARCH */
searchInput.oninput=function(){
const v=this.value.toLowerCase();

render(products.filter(p=>
(p.name||"").toLowerCase().includes(v) ||
(p.code||"").includes(v) ||
(p.category||"").toLowerCase().includes(v)
));
}

/* IMAGE VIEW */
window.viewImg=(src)=>{
fullImg.src=src;
imgView.style.display="flex";
}

/* FORM */
window.openForm=()=>{
editId=null;
modal.style.display="flex";
}

window.closeForm=()=>{
modal.style.display="none";
}

/* IMAGE */
function toBase64(file){
return new Promise(res=>{
const r=new FileReader();
r.onload=()=>res(r.result);
r.readAsDataURL(file);
});
}

/* SAVE */
window.save=async()=>{

const data={
name:name.value.trim(),
code:code.value.trim(),
category:category.value.trim(),
buy:Number(buy.value),
sell:Number(sell.value),
stock:Number(stock.value),
uid:user.uid
};

if(!data.name || !data.code || !data.category || !data.buy || !data.sell || !data.stock){
alert("Fill all fields");
return;
}

/* image */
const file=imageFile.files[0];
if(file){
data.image=await toBase64(file);
}

/* FIX DUPLICATE BUG */
if(editId){
await updateDoc(doc(db,"products",editId),data);
}else{
await addDoc(collection(db,"products"),data);
}

closeForm();
load();
}

/* EDIT */
window.edit=(id)=>{
const p=products.find(x=>x.id==id);
editId=id;

name.value=p.name;
code.value=p.code;
category.value=p.category;
buy.value=p.buy;
sell.value=p.sell;
stock.value=p.stock;

openForm();
}

/* DELETE */
window.del=async(id)=>{
if(confirm("Delete?")){
await deleteDoc(doc(db,"products",id));
load();
}
}

</script>

</body>
</html>
