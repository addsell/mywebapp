<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sell Product</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:white;
padding:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
}

.products{
padding:10px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
}

input{
width:80%;
padding:5px;
margin-top:5px;
}

button{
background:#28a745;
color:white;
border:none;
padding:8px;
border-radius:6px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="header">
<h2>Sell Products</h2>
<a href="sellsreport.html">Sell Report</a>
</div>

<div class="products" id="productList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore,collection,getDocs,addDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636"
};

const app = initializeApp(firebaseConfig);

const db=getFirestore(app);
const auth=getAuth(app);

let userId=null;

onAuthStateChanged(auth,(user)=>{

if(user){
userId=user.uid;
loadProducts();
}

});

async function loadProducts(){

const snap=await getDocs(collection(db,"users",userId,"products"));

const list=document.getElementById("productList");

list.innerHTML="";

snap.forEach((docu)=>{

const p=docu.data();

list.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>

<p>Price : ${p.sell}</p>

<input type="number" id="qty_${docu.id}" placeholder="Qty">

<button onclick="sellProduct('${docu.id}','${p.name}','${p.sell}','${p.stock}')">
Sell
</button>

</div>

`;

});

}

window.sellProduct=async(id,name,price,stock)=>{

const qty=document.getElementById("qty_"+id).value;

if(qty=="" || qty<=0){
alert("Enter quantity");
return;
}

const total=qty*price;

await addDoc(collection(db,"users",userId,"sales"),{

name,
price,
qty:Number(qty),
total,
date:new Date().toLocaleString()

});

alert("Product Sold");

}

</script>

</body>
</html>
