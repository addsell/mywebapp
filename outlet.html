<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Outlet List</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#dff0d8;
padding:15px;
}

/* top bar */
.top-box{
background:linear-gradient(90deg,#2f83d6,#2ea6ff);
color:#ffc35a;
font-size:24px;
font-weight:bold;
padding:18px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.add-btn{
cursor:pointer;
}

/* cards */
#outletList{
display:flex;
flex-direction:column;
gap:18px;
}

.card{
background:linear-gradient(90deg,#0db7c3,#12c3d3);
padding:18px;
border-radius:8px;
color:black;
}

.name-row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:30px;
margin-bottom:15px;
flex-wrap:wrap;
gap:10px;
}

.phone{
font-size:22px;
}

.phone a{
text-decoration:none;
color:black;
}

.bottom-row{
display:flex;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
font-size:18px;
margin-top:10px;
}

.action{
cursor:pointer;
}

/* modal */
.modal{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:15px;
z-index:999;
}

.form-box{
background:white;
width:100%;
max-width:420px;
padding:20px;
border-radius:12px;
}

.form-box h2{
text-align:center;
margin-bottom:15px;
}

.form-box input{
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

.btn-row{
display:flex;
gap:10px;
margin-top:10px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.save{
background:#00b96b;
color:white;
}

.cancel{
background:#999;
color:white;
}

</style>

</head>
<body>

<div class="top-box">
<div>Total Outlets: <span id="total">0</span></div>
<div class="add-btn" onclick="openForm()">Add Outlet</div>
</div>

<div id="outletList"></div>

<!-- modal -->
<div class="modal" id="modal">
<div class="form-box">

<h2 id="formTitle">Add Outlet</h2>

<input type="text" id="shopName" placeholder="Outlet Name">
<input type="text" id="ownerName" placeholder="Owner Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Address">

<div class="btn-row">
<button class="btn save" onclick="saveOutlet()">Save</button>
<button class="btn cancel" onclick="closeForm()">Cancel</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
deleteDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.appspot.com",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;
let editId=null;

/* login check */
onAuthStateChanged(auth,(user)=>{

if(user){
currentUser=user;
loadOutlets();
}else{
location.href="login.html";
}

});

/* load data */
async function loadOutlets(){

const list=document.getElementById("outletList");
list.innerHTML="";

const q=query(
collection(db,"outlets"),
where("uid","==",currentUser.uid)
);

const snap=await getDocs(q);

document.getElementById("total").innerText=snap.size;

snap.forEach((docSnap)=>{

const d=docSnap.data();

list.innerHTML += `

<div class="card">

<div class="name-row">

<div>${d.shopName}</div>

<div class="phone">
<a href="tel:${d.phone}">📞 ${d.phone}</a>
</div>

</div>

<div class="bottom-row">

<div>Address: ${d.address}</div>

<div class="action" onclick="editOutlet('${docSnap.id}','${d.shopName}','${d.ownerName}','${d.phone}','${d.address}')">Edit Information</div>

<div class="action" onclick="deleteOutlet('${docSnap.id}')">Delete Outlet</div>

</div>

</div>

`;

});

}

/* open add form */
window.openForm=function(){

editId=null;
document.getElementById("formTitle").innerText="Add Outlet";

document.getElementById("shopName").value="";
document.getElementById("ownerName").value="";
document.getElementById("phone").value="";
document.getElementById("address").value="";

document.getElementById("modal").style.display="flex";

}

/* close */
window.closeForm=function(){
document.getElementById("modal").style.display="none";
}

/* save */
window.saveOutlet=async function(){

const shopName=document.getElementById("shopName").value;
const ownerName=document.getElementById("ownerName").value;
const phone=document.getElementById("phone").value;
const address=document.getElementById("address").value;

if(shopName=="" || phone==""){
alert("Fill required fields");
return;
}

if(editId==null){

await addDoc(collection(db,"outlets"),{
uid:currentUser.uid,
shopName,
ownerName,
phone,
address,
date:Date.now()
});

}else{

await updateDoc(doc(db,"outlets",editId),{
shopName,
ownerName,
phone,
address
});

}

closeForm();
loadOutlets();

}

/* edit */
window.editOutlet=function(id,name,owner,phone,address){

editId=id;

document.getElementById("formTitle").innerText="Edit Outlet";

document.getElementById("shopName").value=name;
document.getElementById("ownerName").value=owner;
document.getElementById("phone").value=phone;
document.getElementById("address").value=address;

document.getElementById("modal").style.display="flex";

}

/* delete */
window.deleteOutlet=async function(id){

if(confirm("Delete this outlet?")){

await deleteDoc(doc(db,"outlets",id));
loadOutlets();

}

}

</script>

</body>
</html>
