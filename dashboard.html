<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sales Dashboard</title>

<style>

body{
margin:0;
font-family:arial;
background:#d9e5d2;
}

/* Top Title */

.top{
background:linear-gradient(90deg,#4aa3b8,#7ecb6c);
padding:15px;
text-align:center;
font-weight:bold;
color:#a7ff2a;
font-size:18px;
}

/* Grid */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:25px;
}

.card{
background:white;
border-radius:20px;
padding:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card img{
width:90px;
height:90px;
}

.card p{
color:#6ac22f;
font-size:18px;
margin-top:8px;
}

/* footer */

.footer{
background:#4fa61f;
text-align:center;
padding:12px;
color:#baff63;
font-weight:bold;
}

</style>

</head>

<body>

<div class="top">
I have to perform better today than yesterday
</div>


<div class="grid">

<div class="card" onclick="openPage('outlet.html')">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
<p>Outlet</p>
</div>

<div class="card" onclick="openPage('products.html')">
<img src="https://cdn-icons-png.flaticon.com/512/3081/3081986.png">
<p>Products</p>
</div>

<div class="card" onclick="openPage('stock.html')">
<img src="https://cdn-icons-png.flaticon.com/512/679/679720.png">
<p>Stock</p>
</div>


<div class="card" onclick="openPage('sale.html')">
<img src="https://cdn-icons-png.flaticon.com/512/891/891419.png">
<p>Sale</p>
</div>

<div class="card" onclick="openPage('salesreport.html')">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
<p>Sales Report</p>
</div>

<div class="card" onclick="openPage('deo.html')">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png">
<p>Deo Reports</p>
</div>


<div class="card" onclick="openPage('note.html')">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828911.png">
<p>Note</p>
</div>

<div class="card" onclick="openPage('summary.html')">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
<p>Own Summery</p>
</div>

<div class="card" onclick="logout()">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828479.png">
<p>Logout</p>
</div>

</div>


<div class="footer">
A good sales representative keeps track of all activities.
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";


const firebaseConfig = {

apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",

authDomain: "mywebapp-93636.firebaseapp.com",

projectId: "mywebapp-93636",

storageBucket: "mywebapp-93636.firebasestorage.app",

messagingSenderId: "644012557966",

appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",

measurementId: "G-BHD1Z4TD7G"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


/* Login Check */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href="login.html";

}

});


/* Page open */

window.openPage=function(page){

window.location.href=page;

}


/* Logout */

window.logout=function(){

signOut(auth).then(()=>{

window.location.href="login.html";

});

}

</script>

</body>

</html>
