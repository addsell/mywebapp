<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#6fb7d6,#d6efd6);
text-align:center;
}

.header{
font-size:22px;
font-weight:bold;
color:#8bd12c;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.card{
background:#3b5f70;
border-radius:25px;
padding:25px 10px;
color:#9cff3d;
font-size:20px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

.icon{
font-size:40px;
margin-bottom:10px;
}

.logout{
margin-top:20px;
}

.logout button{
background:#39b000;
border:none;
padding:12px 30px;
border-radius:30px;
font-size:18px;
color:white;
cursor:pointer;
}

.footer{
margin-top:30px;
background:#2f8a1c;
color:#a8ff5a;
padding:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
I have to perform better today than yesterday
</div>

<div class="grid">

<div class="card" onclick="openPage('shop.html')">
<div class="icon">🛒</div>
Shop
</div>

<div class="card" onclick="openPage('products.html')">
<div class="icon">📦</div>
Products
</div>

<div class="card" onclick="openPage('stock.html')">
<div class="icon">📊</div>
Stock
</div>

<div class="card" onclick="openPage('sale.html')">
<div class="icon">💰</div>
Sale
</div>

<div class="card" onclick="openPage('salesreport.html')">
<div class="icon">📈</div>
Sales Report
</div>

<div class="card" onclick="openPage('deoreport.html')">
<div class="icon">📋</div>
Deo Reports
</div>

<div class="card" onclick="openPage('note.html')">
<div class="icon">📝</div>
Note
</div>

<div class="card" onclick="openPage('summary.html')">
<div class="icon">📊</div>
Own Summary
</div>

<div class="card" onclick="openPage('profile.html')">
<div class="icon">👤</div>
Profile
</div>

</div>

<div class="logout">
<button onclick="logout()">Logout</button>
</div>

<div class="footer">
A good sales representative keeps track of all activities.
</div>





<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";


const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",
measurementId: "G-BHD1Z4TD7G"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);



onAuthStateChanged(auth,(user)=>{
if(!user){
window.location="login.html";
}
});



window.logout=function(){
signOut(auth).then(()=>{
alert("Logout Successful")
window.location="login.html"
})
}


window.openPage=function(page){
window.location=page
}

</script>

</body>
</html>
