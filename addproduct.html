<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Product</title>

<style>

body{
font-family:Arial;
margin:0;
background:#e9f5e6;
}

.header{
text-align:center;
font-size:24px;
font-weight:bold;
color:#f4a742;
padding:15px;
}

.container{
padding:15px;
max-width:420px;
margin:auto;
}

/* upload */

.upload{
width:90px;
height:90px;
background:#ccc;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
cursor:pointer;
font-size:12px;
margin:auto;
}

.upload input{
display:none;
}

/* input design */

input,select{

width:85%;
height:50px;

padding:0 15px;

border:none;
border-radius:30px;

margin-top:10px;

background:linear-gradient(90deg,#7b4dff,#00b96b);

color:white;
font-size:14px;

display:block;
margin-left:auto;
margin-right:auto;

}

/* price row */

.price-row{

display:flex;
justify-content:center;
gap:10px;
margin-top:10px;

}

.price-row input{

width:28%;
height:45px;

}

/* save button */

.save{

margin-top:25px;

background:#f4a742;

border:none;

padding:12px 35px;

border-radius:30px;

font-size:16px;

cursor:pointer;

display:block;
margin-left:auto;
margin-right:auto;

}

/* category */

.category-box{

margin-top:10px;

display:flex;
justify-content:center;

gap:6px;

}

.category-box input{

width:60%;
background:white;
color:black;

}

.cat-btn{

background:#00b96b;

border:none;

padding:10px 15px;

color:white;

border-radius:20px;

cursor:pointer;

}

/* category list */

.category-list{

margin-top:10px;

}

.cat-item{

display:flex;

justify-content:space-between;

background:white;

padding:8px 12px;

margin-top:6px;

border-radius:12px;

font-size:14px;

}

.delete{

color:red;

cursor:pointer;

}

</style>

</head>

<body>

<div class="header">Add Products</div>

<div class="container">

<label class="upload">
<input type="file">
Upload Photo
</label>

<input type="text" id="name" placeholder="Product Name">

<input type="text" id="code" placeholder="Product Code">

<select id="category">
<option>Select Category</option>
</select>

<div class="category-box">

<input type="text" id="newCategory" placeholder="New Category">

<button class="cat-btn" onclick="addCategory()">Add</button>

</div>

<div class="category-list" id="categoryList"></div>

<input type="number" id="stock" placeholder="Total Stock Piece">

<div class="price-row">

<input type="number" id="purchase" placeholder="Purchase">

<input type="number" id="sell" placeholder="Sell">

<input type="number" id="mrp" placeholder="MRP">

</div>

<button class="save" onclick="saveProduct()">Save</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc

} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",

authDomain: "mywebapp-93636.firebaseapp.com",

projectId: "mywebapp-93636",

storageBucket: "mywebapp-93636.firebasestorage.app",

messagingSenderId: "644012557966",

appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",

measurementId: "G-BHD1Z4TD7G"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const categorySelect=document.getElementById("category");

const categoryList=document.getElementById("categoryList");

/* load category */

async function loadCategory(){

categorySelect.innerHTML="<option>Select Category</option>";

categoryList.innerHTML="";

const querySnapshot=await getDocs(collection(db,"categories"));

querySnapshot.forEach((docSnap)=>{

const data=docSnap.data();

categorySelect.innerHTML+=`<option>${data.name}</option>`;

categoryList.innerHTML+=`

<div class="cat-item">

${data.name}

<span class="delete" onclick="deleteCategory('${docSnap.id}')">Delete</span>

</div>

`;

});

}

/* add category */

window.addCategory=async function(){

const name=document.getElementById("newCategory").value;

if(name==""){

alert("Enter Category");

return;

}

await addDoc(collection(db,"categories"),{

name:name

});

document.getElementById("newCategory").value="";

loadCategory();

}

/* delete category */

window.deleteCategory=async function(id){

await deleteDoc(doc(db,"categories",id));

loadCategory();

}

/* save product */

window.saveProduct=async function(){

const name=document.getElementById("name").value;

const code=document.getElementById("code").value;

const category=document.getElementById("category").value;

const stock=document.getElementById("stock").value;

const purchase=document.getElementById("purchase").value;

const sell=document.getElementById("sell").value;

const mrp=document.getElementById("mrp").value;

if(name==""){

alert("Enter Product Name");

return;

}

await addDoc(collection(db,"products"),{

name:name,

code:code,

category:category,

stock:stock,

purchase:purchase,

sell:sell,

mrp:mrp,

date:Date.now()

});

alert("Product Saved Successfully");

location.href="products.html";

}

loadCategory();

</script>

</body>

</html>
