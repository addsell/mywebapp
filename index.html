<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binoyog</title>

<style>

body{
background:#061a28;
font-family:sans-serif;
color:white;
text-align:center;
}

.container{
width:90%;
max-width:400px;
margin:auto;
margin-top:80px;
}

h1{
color:#00d4a3;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1a2d3a;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:10px;
background:#00d4a3;
font-size:16px;
}

.tabs{
display:flex;
justify-content:space-around;
margin-bottom:15px;
}

.tabs span{
cursor:pointer;
padding:10px;
}

.active{
color:#00d4a3;
border-bottom:2px solid #00d4a3;
}

.hidden{
display:none;
}

</style>

</head>
<body>

<div class="container">

<h1>Binoyog</h1>
<p>Hello, Welcome to Binoyog</p>

<div class="tabs">
<span id="loginTab" class="active">Log in</span>
<span id="signupTab">Sign up</span>
</div>

<!-- LOGIN -->
<div id="loginBox">

<input type="email" id="loginEmail" placeholder="Gmail">
<input type="password" id="loginPassword" placeholder="Password">

<button onclick="login()">Log in</button>

<p onclick="resetPassword()">Forgot password?</p>

</div>


<!-- SIGNUP -->
<div id="signupBox" class="hidden">

<input type="text" id="name" placeholder="Full name">
<input type="email" id="email" placeholder="Gmail">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirmPassword" placeholder="Confirm password">

<button onclick="signup()">Continue</button>

</div>

</div>


<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>


<script>

const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
appId: "YOUR_APP_ID"

};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();


// Signup

function signup(){

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;
const confirm=document.getElementById("confirmPassword").value;

if(password!=confirm){
alert("Password not match");
return;
}

auth.createUserWithEmailAndPassword(email,password)

.then(()=>{
alert("Account Created Successfully");
})

.catch((error)=>{
alert(error.message);
});

}



// Login

function login(){

const email=document.getElementById("loginEmail").value;
const password=document.getElementById("loginPassword").value;

auth.signInWithEmailAndPassword(email,password)

.then(()=>{
alert("Login Success");
})

.catch((error)=>{
alert(error.message);
});

}



// Reset password

function resetPassword(){

const email=prompt("Enter your Gmail");

auth.sendPasswordResetEmail(email)

.then(()=>{
alert("Password reset link sent");
})

.catch((error)=>{
alert(error.message);
});

}



// Tab Switch

document.getElementById("signupTab").onclick=function(){

document.getElementById("signupBox").classList.remove("hidden");
document.getElementById("loginBox").classList.add("hidden");

this.classList.add("active");
document.getElementById("loginTab").classList.remove("active");

};

document.getElementById("loginTab").onclick=function(){

document.getElementById("loginBox").classList.remove("hidden");
document.getElementById("signupBox").classList.add("hidden");

this.classList.add("active");
document.getElementById("signupTab").classList.remove("active");

};

</script>

</body>
</html>
