<!DOCTYPE html>
<html>
<head>
<title>My Firebase App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Arial;
text-align:center;
padding:20px;
background:#f2f2f2;
}

.box{
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<h2>My Firebase Web App</h2>

<div class="box">
<h3>User Info</h3>
<p id="name">Loading...</p>
<p id="email"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQCeuVGNSCLkNU83xtpHN098x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.appspot.com",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2e621c41cf7ebdf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadUsers(){

const querySnapshot = await getDocs(collection(db, "users"));

querySnapshot.forEach((doc)=>{

document.getElementById("name").innerText="Name: "+doc.data().name;
document.getElementById("email").innerText="Email: "+doc.data().email;

});

}

loadUsers();

</script>

</body>
</html>
