<!DOCTYPE html>
<html>
<head>
<title>Firebase Login</title>
<style>
body{
font-family:Arial;
text-align:center;
margin-top:50px;
}

input{
padding:10px;
margin:5px;
width:200px;
}

button{
padding:10px 20px;
margin:5px;
}
</style>
</head>

<body>

<h2>Firebase Login / Signup</h2>

<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
document.getElementById("msg").innerText="Signup Success"
})
.catch((error)=>{
document.getElementById("msg").innerText=error.message
})

}

window.login = function(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
document.getElementById("msg").innerText="Login Success"
})
.catch((error)=>{
document.getElementById("msg").innerText=error.message
})

}

</script>

</body>
</html>
