<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
background:#061c28;
font-family:arial;
text-align:center;
color:white;
}

.container{
margin-top:100px;
}

input{
width:80%;
padding:15px;
margin:10px;
border-radius:12px;
border:none;
background:#1e3443;
color:white;
font-size:16px;
}

button{
width:80%;
padding:15px;
border:none;
border-radius:12px;
background:#00e0a4;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h2>Log in</h2>

<input type="email" id="email" placeholder="Gmail">

<input type="password" id="password" placeholder="Password">

<br>

<button onclick="login()">Log in</button>

<br><br>

<a href="signup.html" style="color:white;">
Create Account
</a>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",
measurementId: "G-BHD1Z4TD7G"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login=function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

alert("Login Success");

})

.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
