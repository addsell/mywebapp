<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

body{
background:#061c28;
font-family:arial;
text-align:center;
color:white;
}

.container{
margin-top:120px;
}

input{
width:80%;
padding:15px;
margin:10px;
border-radius:15px;
border:none;
background:#1e3443;
color:white;
font-size:16px;
}

button{
width:80%;
padding:15px;
border:none;
border-radius:15px;
background:#00d6a3;
font-size:18px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

a{
color:white;
}

.status{
margin-top:10px;
color:#00d6a3;
}

</style>

</head>

<body>

<div class="container">

<h2>Log in</h2>

<input type="email" id="email" placeholder="Gmail">

<input type="password" id="password" placeholder="Password">

<br>

<button onclick="login()">Log in</button>

<div class="status" id="status"></div>

<br><br>

<a href="signup.html">Create Account</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",
measurementId: "G-BHD1Z4TD7G"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);


onAuthStateChanged(auth, async(user)=>{

if(user){

localStorage.setItem("uid",user.uid)

window.location.href="dashboard.html"

}

})


window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

status.innerText="Logging in..."

try{

const userCredential = await signInWithEmailAndPassword(auth,email,password)

const user = userCredential.user

localStorage.setItem("uid",user.uid)

status.innerText="Login Success"

setTimeout(()=>{

window.location.href="dashboard.html"

},800)

}catch(error){

status.innerText="Wrong Email or Password"

}

}

</script>

</body>
</html>
