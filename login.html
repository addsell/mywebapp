<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#061c28;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:15px;
}

.container{
width:100%;
max-width:400px;
background:#0c2a39;
padding:30px 20px;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
text-align:center;
}

h2{
color:white;
margin-bottom:25px;
font-size:28px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:15px;
background:#1e3443;
color:white;
font-size:16px;
outline:none;
}

input::placeholder{
color:#aebcc6;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
background:#00d6a3;
color:#061c28;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

a{
display:inline-block;
margin-top:20px;
color:white;
text-decoration:none;
font-size:15px;
}

#msg{
margin-top:15px;
font-size:14px;
color:#ffcc66;
}

</style>

</head>

<body>

<div class="container">

<h2>Log In</h2>

<input type="email" id="email" placeholder="Enter Gmail">

<input type="password" id="password" placeholder="Enter Password">

<button id="loginBtn">Log In</button>

<a href="signup.html">Create Account</a>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.appspot.com",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const msg = document.getElementById("msg");

/* already login হলে dashboard এ যাবে */

onAuthStateChanged(auth,(user)=>{
if(user){
window.location.href="dashboard.html";
}
});

/* login */

document.getElementById("loginBtn").addEventListener("click",async()=>{

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

if(email=="" || password==""){
msg.innerText="Enter email and password";
return;
}

msg.innerText="Logging in...";

try{

await signInWithEmailAndPassword(auth,email,password);

window.location.href="dashboard.html";

}catch(error){

msg.innerText="Login Failed";

}

});

</script>

</body>
</html>
