<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop List</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#6fb7d6,#b7e3b7);
}

.topbar{
display:flex;
justify-content:space-between;
padding:20px;
font-size:24px;
font-weight:bold;
}

.add{
color:#ffbf5e;
cursor:pointer;
}

.searchBox{
padding:15px;
}

.searchBox input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid gray;
}

.container{
padding:20px;
}

.shop{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.shop button{
margin-top:8px;
margin-right:5px;
padding:6px 12px;
border:none;
border-radius:6px;
}

.edit{
background:#ffbf5e;
}

.delete{
background:#ff5e5e;
color:white;
}

.form{
display:none;
padding:20px;
}

.form input{
width:100%;
padding:15px;
margin:12px 0;
font-size:16px;
border-radius:8px;
border:1px solid gray;
}

.save{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
background:#3bb143;
color:white;
}

</style>

</head>

<body>


<div class="topbar">

<div>Shop List</div>

<div class="add" onclick="showForm()">Add Shop</div>

</div>


<div class="searchBox">

<input type="text" id="search" placeholder="Search shop..." onkeyup="searchShop()">

</div>


<div class="container" id="shopList"></div>



<div class="form" id="form">

<input type="text" id="name" placeholder="Shop Name">

<input type="number" id="mobile" placeholder="Mobile Number">

<input type="text" id="address" placeholder="Address">

<button class="save" onclick="saveShop()">Save</button>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
}

from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";



const firebaseConfig = {

apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",
measurementId: "G-BHD1Z4TD7G"

};


const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



let editId = null
let shopData = []



window.showForm=function(){

document.getElementById("form").style.display="block"

}



window.saveShop=async function(){

let name=document.getElementById("name").value
let mobile=document.getElementById("mobile").value
let address=document.getElementById("address").value


if(name==""||mobile==""||address==""){

alert("Fill all fields")
return

}



if(editId){

await updateDoc(doc(db,"shops",editId),{

name:name,
mobile:mobile,
address:address

})

alert("Shop Updated")

}else{

await addDoc(collection(db,"shops"),{

name:name,
mobile:mobile,
address:address

})

alert("Shop Added")

}


location.reload()

}



window.deleteShop=async function(id){

if(confirm("Delete this shop?")){

await deleteDoc(doc(db,"shops",id))

location.reload()

}

}



window.editShop=function(id){

let shop=shopData.find(s=>s.id===id)

document.getElementById("name").value=shop.name
document.getElementById("mobile").value=shop.mobile
document.getElementById("address").value=shop.address

editId=id

showForm()

}



window.searchShop=function(){

let text=document.getElementById("search").value.toLowerCase()

let filtered=shopData.filter(s=>s.name.toLowerCase().includes(text))

displayShop(filtered)

}



function displayShop(data){

document.getElementById("shopList").innerHTML=""

data.forEach(shop=>{

let div=document.createElement("div")

div.className="shop"

div.innerHTML=`

<b>${shop.name}</b><br>

📞 ${shop.mobile}<br>

📍 ${shop.address}<br>

<button class="edit" onclick="editShop('${shop.id}')">Edit</button>

<button class="delete" onclick="deleteShop('${shop.id}')">Delete</button>

`

document.getElementById("shopList").appendChild(div)

})

}



async function loadShop(){

const querySnapshot=await getDocs(collection(db,"shops"))

querySnapshot.forEach((docu)=>{

let data=docu.data()

shopData.push({

id:docu.id,
name:data.name,
mobile:data.mobile,
address:data.address

})

})


displayShop(shopData)

}



loadShop()

</script>

</body>

</html>
