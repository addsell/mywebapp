<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shop List</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#6fb7d6,#b7e3b7);
}

.topbar{
display:flex;
justify-content:space-between;
padding:20px;
font-size:28px;
font-weight:bold;
}

.add{
color:#ffbf5e;
cursor:pointer;
}

.container{
padding:20px;
}

.shop{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.form{
display:none;
padding:30px;
}

.form input{
width:100%;
padding:15px;
margin:15px 0;
font-size:18px;
border-radius:8px;
border:1px solid gray;
}

.save{
width:100%;
padding:15px;
font-size:20px;
border:none;
border-radius:10px;
background:#3bb143;
color:white;
}

</style>
</head>

<body>

<div class="topbar">

<div>Shop List</div>

<div class="add" onclick="showForm()">Add Shop</div>

</div>


<div class="container" id="shopList"></div>



<div class="form" id="form">

<input type="text" id="name" placeholder="Shop Name">

<input type="number" id="mobile" placeholder="Mobile Number">

<input type="text" id="address" placeholder="Address">

<button class="save" onclick="saveShop()">Save</button>

</div>





<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";


const firebaseConfig = {
apiKey: "AIzaSyBpqOjnQC8yuE0NSCLtKNu83xtpHNd98x4",
authDomain: "mywebapp-93636.firebaseapp.com",
projectId: "mywebapp-93636",
storageBucket: "mywebapp-93636.firebasestorage.app",
messagingSenderId: "644012557966",
appId: "1:644012557966:web:aee6cc2a2621c41cf7ebdf",
measurementId: "G-BHD1Z4TD7G"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);



window.showForm=function(){

document.getElementById("form").style.display="block"

}



window.saveShop=async function(){

let name=document.getElementById("name").value
let mobile=document.getElementById("mobile").value
let address=document.getElementById("address").value


if(name==""||mobile==""||address==""){

alert("Fill all fields")
return

}


await addDoc(collection(db,"shops"),{

name:name,
mobile:mobile,
address:address

})

alert("Shop Added")

location.reload()

}




async function loadShop(){

const querySnapshot=await getDocs(collection(db,"shops"))

querySnapshot.forEach((doc)=>{

let shop=doc.data()

let div=document.createElement("div")

div.className="shop"

div.innerHTML=`

<b>${shop.name}</b><br>
📞 ${shop.mobile}<br>
📍 ${shop.address}

`

document.getElementById("shopList").appendChild(div)

})

}

loadShop()

</script>

</body>
</html>
